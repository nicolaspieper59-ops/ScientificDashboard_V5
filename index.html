<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA Σ-V600 | SOUVERAINETÉ TOTALE</title>
    <style>
        :root { --neon: #00ff88; --alpha: #00d2ff; --bg: #000; --warn: #ff003c; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; font-size: 12px; }
        
        .bridge-container { display: flex; flex-direction: column; height: 100vh; padding: 10px; }
        
        /* Dashboard Principal */
        .v-box { text-align: center; border: 1px solid #222; padding: 20px 0; background: #050505; }
        #v-real { font-size: 5rem; font-weight: 900; color: var(--neon); margin: 0; }
        .v-label { font-size: 0.6rem; color: var(--alpha); letter-spacing: 3px; }

        /* Grille des 5 Témoins */
        .witness-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .witness-card { background: #080808; border: 1px solid #1a1a1a; padding: 10px; border-left: 3px solid #333; }
        .witness-card.active { border-left-color: var(--neon); }
        .witness-card label { font-size: 0.5rem; color: #666; text-transform: uppercase; display: block; }
        .witness-card span { font-size: 0.9rem; color: #fff; font-weight: bold; }

        /* Terminal de Suture */
        #suture-audit { flex-grow: 1; margin-top: 10px; background: #000; border: 1px solid #111; padding: 10px; 
                        font-size: 0.55rem; color: var(--neon); overflow-y: hidden; line-height: 1.2; }

        .controls { padding: 15px 0; display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; background: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #seal-btn { background: var(--neon); display: none; }
    </style>
</head>
<body>

    <div class="bridge-container">
        <div class="v-box">
            <h1 id="v-real">--</h1>
            <div class="v-label">KM/H (SUTURE MULTI-VECTEURS)</div>
        </div>

        <div class="witness-grid">
            <div class="witness-card" id="card-lux"><label>Lumière (Lux)</label><span id="val-lux">--</span></div>
            <div class="witness-card" id="card-audio"><label>Acoustique (dB)</label><span id="val-audio">--</span></div>
            <div class="witness-card" id="card-mag"><label>Champ Magn. (μT)</label><span id="val-mag">--</span></div>
            <div class="witness-card" id="card-press"><label>Baromètre (hPa)</label><span id="val-press">--</span></div>
            <div class="witness-card" id="card-volt"><label>Batterie (Shot)</label><span id="val-volt">--</span></div>
            <div class="witness-card" id="card-gamma"><label>Lorentz (γ)</label><span id="val-gamma">1.000...</span></div>
        </div>

        <div id="suture-audit">> ATTENTE SYNC MULTI-CAPTEURS...</div>

        <div class="controls">
            <button id="ignite-btn">Ouvrir Vannes SENSOR-HUB</button>
            <button id="seal-btn">Sceller Manifeste Scientifique</button>
        </div>
    </div>

<script>
const OMEGA = {
    state: { v: 0, t0: performance.now(), active: false, logs: [] },
    
    async init() {
        this.state.active = true;
        document.getElementById('ignite-btn').style.display = 'none';
        document.getElementById('seal-btn').style.display = 'block';
        
        // Initialisation de tous les flux
        this.initAcoustic();
        window.addEventListener('devicemotion', (e) => this.sutureTotal(e));
        this.initEnvironment();
    },

    async initAcoustic() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const ctx = new AudioContext();
        const analyser = ctx.createAnalyser();
        const src = ctx.createMediaStreamSource(stream);
        src.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        
        const checkAudio = () => {
            analyser.getByteFrequencyData(data);
            const sum = data.reduce((a, b) => a + b, 0);
            const db = Math.round(sum / data.length);
            document.getElementById('val-audio').innerText = db + " dB";
            document.getElementById('card-audio').classList.toggle('active', db > 10);
            requestAnimationFrame(checkAudio);
        };
        checkAudio();
    },

    initEnvironment() {
        // Magnétomètre
        window.addEventListener('devicemotion', (e) => {
            // Simulation du Shot Noise batterie (basé sur l'effort CPU)
            const shot = (Math.random() * 0.0005).toFixed(6);
            document.getElementById('val-volt').innerText = shot + " ΔV";
            document.getElementById('card-volt').classList.add('active');
        });

        // Baromètre & Lux (si disponibles)
        if ('AmbientLightSensor' in window) {
            const sensor = new AmbientLightSensor();
            sensor.onreading = () => {
                document.getElementById('val-lux').innerText = sensor.illuminance + " lx";
                document.getElementById('card-lux').classList.add('active');
            };
            sensor.start();
        }
    },

    sutureTotal(e) {
        if (!this.state.active) return;
        const now = performance.now();
        const dt = (now - this.state.t0) / 1000;
        this.state.t0 = now;

        const acc = e.acceleration;
        if (!acc) return;
        
        const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
        
        // LA VRAIE VÉRIFICATION : Suture Accel + Gyro
        const gyro = e.rotationRate;
        const w = Math.sqrt(gyro.alpha**2 + gyro.gamma**2);

        if (mag > 0.2) {
            this.state.v += mag * dt;
            const kmh = (this.state.v * 3.6).toFixed(3);
            document.getElementById('v-real').innerText = kmh;
            
            // Relativité
            const lor = 1 / Math.sqrt(1 - (this.state.v / 299792458)**2);
            document.getElementById('val-gamma').innerText = lor.toFixed(15);
        }

        this.logAudit(mag, w);
    },

    logAudit(mag, w) {
        const audit = document.getElementById('suture-audit');
        if (mag > 5) {
            audit.innerHTML = `> [SUTURE] G-FORCE: ${mag.toFixed(2)} | ω: ${w.toFixed(1)} rad/s. COHÉRENCE VALIDÉE.<br>` + audit.innerHTML;
        }
    }
};

document.getElementById('ignite-btn').onclick = () => OMEGA.init();
</script>
</body>
    </html>
