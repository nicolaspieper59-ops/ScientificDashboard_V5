<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SOUVERAIN : RÉALITÉ BRUTE SANS CONSTANTE</title>
    <style>
        body { background: #000; color: #00ff88; font-family: monospace; padding: 20px; }
        .raw-hex { font-size: 1.8em; color: #fff; word-break: break-all; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .label { font-size: 0.7em; color: #555; text-transform: uppercase; margin-top: 10px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .cell { border: 1px solid #111; padding: 10px; background: #050505; }
        .val { color: #ff0055; font-weight: bold; }
        button { width: 100%; padding: 30px; background: #00ff88; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="label">Suture Atomique (Distance Cumulative sans Filtre) :</div>
<div id="val" class="raw-hex">0.0000000000000000000000000000000000000000</div>

<div class="data-grid">
    <div class="cell"><span class="label">Vitesse X</span><br><span id="vx" class="val">0</span></div>
    <div class="cell"><span class="label">Vitesse Y</span><br><span id="vy" class="val">0</span></div>
    <div class="cell"><span class="label">Vitesse Z</span><br><span id="vz" class="val">0</span></div>
    <div class="cell"><span class="label">Delta T (ms)</span><br><span id="dt" class="val">0</span></div>
</div>

<button id="ignite" style="margin-top:20px;">BRANCHER LE CAPTEUR SUR LA RÉALITÉ</button>

<script>
const CONFIG = { PRECISION: 10n ** 40n, STORAGE: "REALITY_RAW_VOYAGE" };
let state = {
    dist: BigInt(localStorage.getItem(CONFIG.STORAGE) || "0"),
    lastT: 0,
    vx: 0, vy: 0, vz: 0, // Vitesse vectorielle initiale
    active: false
};

window.addEventListener('devicemotion', (e) => {
    if (!state.active) return;

    // 1. TEMPS RÉEL DU QUARTZ
    const now = performance.now();
    if (state.lastT === 0) { state.lastT = now; return; }
    const dt = (now - state.lastT) / 1000;
    state.lastT = now;

    // 2. ACCÉLÉRATION BRUTE (SANS FILTRE)
    // On utilise l'accélération linéaire transmise par le matériel.
    // Sans seuil (threshold), le moindre bruit de 0.000001 est compté.
    const a = e.acceleration;
    if (!a || a.x === null) return;

    // 3. CINÉMATIQUE SANS CONSTANTE DE FRICTION
    // On applique Newton : V = V0 + at. On ne retire rien, on ne simplifie rien.
    state.vx += a.x * dt;
    state.vy += a.y * dt;
    state.vz += a.z * dt;

    // Magnitude de la vitesse vectorielle
    const v_total = Math.sqrt(state.vx**2 + state.vy**2 + state.vz**2);
    
    // Distance = V * T
    const ds_meters = v_total * dt;
    
    // 4. GRAVURE ATOMIQUE (BIGINT)
    const ds_quanta = BigInt(Math.floor(ds_meters * Number(CONFIG.PRECISION)));
    state.dist += ds_quanta;

    // 5. AFFICHAGE DE LA VÉRITÉ MATÉRIELLE
    let s = state.dist.toString().padStart(41, '0');
    document.getElementById('val').innerText = `${s.slice(0, -40) || '0'}.${s.slice(-40)}`;
    
    document.getElementById('vx').innerText = state.vx.toFixed(6);
    document.getElementById('vy').innerText = state.vy.toFixed(6);
    document.getElementById('vz').innerText = state.vz.toFixed(6);
    document.getElementById('dt').innerText = (dt * 1000).toFixed(2);

    if (state.dist % 100n === 0n) localStorage.setItem(CONFIG.STORAGE, state.dist.toString());
});

document.getElementById('ignite').addEventListener('click', async () => {
    if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
    state.active = true;
    document.getElementById('ignite').style.display = 'none';
});
</script>
</body>
    </html>
