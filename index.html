<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OMNI-SCANNER : COMPOSANTS BRUTS</title>
    <style>
        body { background: #000; color: #00ff88; font-family: monospace; padding: 10px; font-size: 0.8em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .comp { border: 1px solid #222; padding: 5px; background: #050505; }
        .label { color: #555; font-size: 0.7em; }
        .val { color: #00d2ff; font-weight: bold; }
        #master-val { font-size: 1.8em; color: #fff; text-align: center; margin: 15px 0; border: 1px double #00ff88; padding: 10px; word-break: break-all; }
        button { width: 100%; padding: 20px; background: #00ff88; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="master-val">0.0000000000000000000000000000000000000000</div>

<button id="ignite">SCANNER LES COMPOSANTS</button>

<div class="grid" id="sensors">
    <div class="comp"><span class="label">MAGNÉTISME X:</span> <span id="magX" class="val">0</span></div>
    <div class="comp"><span class="label">MAGNÉTISME Y:</span> <span id="magY" class="val">0</span></div>
    <div class="comp"><span class="label">BATTERIE V:</span> <span id="batV" class="val">0</span></div>
    <div class="comp"><span class="label">CHARGE:</span> <span id="batC" class="val">0</span></div>
    <div class="comp"><span class="label">QUARTZ DT:</span> <span id="qdt" class="val">0</span></div>
    <div class="comp"><span class="label">GRAVITÉ Z:</span> <span id="gz" class="val">0</span></div>
</div>

<script>
const CONFIG = { PRECISION: 10n ** 40n, STORAGE: "OMNI_SCAN_42" };
let state = { dist: BigInt(localStorage.getItem(CONFIG.STORAGE) || "0"), lastT: performance.now(), active: false };

async function initSensors() {
    // 1. SCAN DE LA BATTERIE (Tension et Chaleur indirecte)
    if ('getBattery' in navigator) {
        const bat = await navigator.getBattery();
        const updateBat = () => {
            document.getElementById('batV').innerText = bat.level.toFixed(4);
            document.getElementById('batC').innerText = bat.charging ? "FLUX" : "STABLE";
        };
        bat.addEventListener('levelchange', updateBat);
        updateBat();
    }

    // 2. SCAN DU CHAMP MAGNÉTIQUE (Boussole / Fer)
    window.addEventListener('deviceorientation', (e) => {
        if (!state.active) return;
        document.getElementById('magX').innerText = e.beta ? e.beta.toFixed(4) : "0";
        document.getElementById('magY').innerText = e.gamma ? e.gamma.toFixed(4) : "0";
    });

    // 3. SCAN DU SILICIUM (Accéléromètre + Gyroscope + Temps)
    window.addEventListener('devicemotion', (e) => {
        if (!state.active) return;

        const now = performance.now();
        const dt = (now - state.lastT) / 1000;
        state.lastT = now;
        document.getElementById('qdt').innerText = (dt * 1000).toFixed(3) + "ms";

        const a = e.accelerationIncludingGravity;
        const r = e.rotationRate || {alpha:0, beta:0, gamma:0};
        if (!a || a.x === null) return;

        document.getElementById('gz').innerText = a.z.toFixed(4);

        // LE CALCUL SOUVERAIN : Fusion de TOUS les composants
        // Force + Rotation + Delta Temps
        const force = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
        const rot = Math.sqrt(r.alpha**2 + r.beta**2 + r.gamma**2);
        
        // On enregistre l'Action Totale (Energie x Temps)
        const action = force * (1 + rot) * dt * 0.001;
        state.dist += BigInt(Math.floor(action * Number(CONFIG.PRECISION)));

        // Rendu
        let s = state.dist.toString().padStart(41, '0');
        document.getElementById('master-val').innerText = `${s.slice(0, -40) || '0'}.${s.slice(-40)}`;

        if (state.dist % 7n === 0n) localStorage.setItem(CONFIG.STORAGE, state.dist.toString());
    });
}

document.getElementById('ignite').addEventListener('click', async () => {
    if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
    state.active = true;
    document.getElementById('ignite').style.display = 'none';
    initSensors();
});
</script>
</body>
</html>
