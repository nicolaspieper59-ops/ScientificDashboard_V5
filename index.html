<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suture Absolue - Pilote de Flux</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            font-size: 1.5em;
            text-transform: uppercase;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input {
            background-color: #1a1a1a;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        button {
            margin-top: 20px;
            background-color: #00ff00;
            color: #000000;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover {
            background-color: #00cc00;
        }
        #resultat {
            margin-top: 30px;
            padding: 15px;
            border: 1px dashed #00ff00;
            background-color: #111;
            font-size: 1.2em;
        }
        .sys-msg {
            font-size: 0.8em;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>Interface de Suture Solaire/Lunaire</h1>
    <p>>_ CONNEXION AU GÉOÏDE... OK</p>

    <label for="angle">Angle Apparent Mesuré (Degrés) :</label>
    <input type="number" id="angle" step="0.01" placeholder="Ex: 45.50">

    <label for="pression">Pression Atmosphérique (hPa) :</label>
    <input type="number" id="pression" step="1" value="1010" placeholder="Ex: 1015">

    <label for="temp">Température Locale (°C) :</label>
    <input type="number" id="temp" step="0.1" value="5" placeholder="Ex: 5.0">

    <button onclick="calculerSuture()">Calculer l'Angle Vrai</button>

    <div id="resultat">
        >_ EN ATTENTE DES DONNÉES DU HARDWARE...
    </div>

    <div class="sys-msg">
        SYS.INFO: Ce terminal ignore l'horloge interne de l'appareil. Seules les lois physiques de la réfraction sont traitées par le silicium.
    </div>

    <script>
        function calculerSuture() {
            // Extraction des données brutes
            let angle_mesure = parseFloat(document.getElementById('angle').value);
            let pression_locale = parseFloat(document.getElementById('pression').value);
            let temperature_locale = parseFloat(document.getElementById('temp').value);

            if (isNaN(angle_mesure) || isNaN(pression_locale) || isNaN(temperature_locale)) {
                document.getElementById('resultat').innerHTML = ">_ ERREUR : DONNÉES MANQUANTES OU CORROMPUES.";
                return;
            }

            // Constantes du Géoïde
            const const_optique_a = 7.31;
            const const_optique_b = 4.4;
            const pression_ref = 1010.0;
            const temp_kelvin_a = 283.0;
            const temp_kelvin_b = 273.0;

            // Conversion Degrés -> Radians pour la tangente
            let deg2rad = Math.PI / 180.0;

            // Logique de Suture
            let facteur_courbure = angle_mesure + (const_optique_a / (angle_mesure + const_optique_b));
            
            // La formule donne la réfraction en arcminutes
            let refraction_brute_arcmin = 1.0 / Math.tan(facteur_courbure * deg2rad);

            let ratio_pression = pression_locale / pression_ref;
            let ratio_temperature = temp_kelvin_a / (temp_kelvin_b + temperature_locale);
            let ajustement_densite_air = ratio_pression * ratio_temperature;

            let refraction_finale_arcmin = refraction_brute_arcmin * ajustement_densite_air;
            
            // Conversion des arcminutes en degrés
            let refraction_finale_deg = refraction_finale_arcmin / 60.0;

            // Soustraction des défauts (Le point de Suture)
            let angle_vrai = angle_mesure - refraction_finale_deg;

            // Affichage Brut
            document.getElementById('resultat').innerHTML = 
                ">_ SUTURE RÉUSSIE<br><br>" +
                "RÉFRACTION DÉDUITE : " + refraction_finale_deg.toFixed(4) + "°<br>" +
                "<strong style='color: white;'>ANGLE VRAI GÉOÏDE : " + angle_vrai.toFixed(4) + "°</strong>";
        }
    </script>
</body>
    </html>
