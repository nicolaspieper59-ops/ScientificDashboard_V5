<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA SUTURE v5000 | VSOP2013 INTEGRATED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bignumber.js/9.1.2/bignumber.min.js"></script>
    <script src="vsop2013.js"></script>
    <style>
        :root { --neon: #00ff88; --alpha: #00d2ff; --jpl: #ff4400; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .card { border: 1px solid #222; padding: 10px; background: rgba(0,0,0,0.5); }
        .full-width { grid-column: span 2; }
        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 1.4rem; font-weight: bold; }
        #video-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.2; object-fit: cover; }
        .sextant-line { position: fixed; top:50%; width:100%; height:1px; background: rgba(255,215,0,0.5); z-index:10; }
        #reality-seal { font-size: 0.7rem; padding: 5px; text-align: center; border-top: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline></video>
    <div class="sextant-line"></div>

    <div class="dashboard">
        <div class="card full-width" style="border-color: var(--neon);">
            <div class="label">Suture Cinétique (Silicium)</div>
            <div id="sp-main" class="val" style="color: var(--neon); font-size: 2.5rem;">0.00 KM/H</div>
        </div>

        <div class="card" style="border-color: var(--jpl);">
            <div class="label">Référentiel VSOP2013 (Terre)</div>
            <div id="val-vsop" class="val" style="color: var(--jpl);">-- KM/S</div>
        </div>

        <div class="card" style="border-color: var(--alpha);">
            <div class="label">Ratio Alpha (1/137)</div>
            <div id="val-alpha" class="val" style="color: var(--alpha);">--</div>
        </div>

        <div class="card">
            <div class="label">Champ EM (µT)</div>
            <div id="val-mag" class="val">--</div>
        </div>

        <div class="card">
            <div class="label">Shot Noise (V)</div>
            <div id="val-voltage" class="val">--</div>
        </div>

        <div class="card full-width">
            <div class="label">Sextant : Angle d'Écliptique</div>
            <div id="val-tilt" class="val" style="color: gold;">0.00°</div>
        </div>
    </div>

    <div id="reality-seal">INITIALISATION DU MOTEUR DE VÉRITÉ...</div>

    <button id="ignite" style="width:100%; padding:20px; margin-top:10px; background:white; font-weight:bold; cursor:pointer;">ACTIVER LA SUTURE TOTALE</button>

<script>
/**
 * 🛰️ MOTEUR OMEGA v5005 - ÉDITION SOUVERAINE
 */
const OMEGA = {
    speed: new BigNumber(0),
    lastT: performance.now(),
    isRunning: false,
    alpha_constant: new BigNumber('0.00729735256'), // Référence Alpha brute
    v_orbitale_cache: new BigNumber(29.78),

    async init() {
        document.getElementById('ignite').style.display = 'none';
        this.isRunning = true;
        
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video-bg').srcObject = stream;

        if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
        
        // Mise à jour VSOP2013 toutes les secondes seulement (économie CPU)
        setInterval(() => this.updateVsop(), 1000);
        this.loop();
    },

    updateVsop() {
        if (!window.vsop2013) return;
        const jd = (Date.now() / 86400000) + 2440587.5;
        const t = (jd - 2451545.0) / 365250;
        
        // Suture VSOP2013 : On calcule la Terre (emb)
        const state = vsop2013.state(vsop2013.t.emb, t);
        const v = Math.sqrt(state.v.x**2 + state.v.y**2 + state.v.z**2);
        this.v_orbitale_cache = new BigNumber(v * 1731456.8 / 1000); // km/s
        document.getElementById('val-vsop').innerText = this.v_orbitale_cache.toFixed(6) + " KM/S";
    },

    loop() {
        // 1. CHAMP MAGNÉTIQUE (Suture EM)
        if ('Magnetometer' in window) {
            const mag = new Magnetometer({frequency: 10});
            mag.onreading = () => {
                const total = Math.sqrt(mag.x**2 + mag.y**2 + mag.z**2);
                document.getElementById('val-mag').innerText = total.toFixed(2);
            };
            mag.start();
        }

        // 2. SHOT NOISE (Tension / Batterie)
        navigator.getBattery().then(bat => {
            let lastLevel = bat.level;
            setInterval(() => {
                // On mesure la micro-chute de tension induite par le calcul
                const noise = Math.abs(bat.level - lastLevel);
                document.getElementById('val-voltage').innerText = (bat.level * 4.2).toFixed(4) + "V";
                lastLevel = bat.level;
            }, 1000);
        });

        // 3. CINÉTIQUE ET ALPHA (Le Cœur)
        window.addEventListener('devicemotion', (e) => {
            const now = performance.now();
            const dt = (now - this.lastT) / 1000;
            this.lastT = now;

            // Utilisation de l'accélération brute sans filtre système
            let acc = e.acceleration; 
            let a_res = Math.sqrt((acc.x||0)**2 + (acc.y||0)**2 + (acc.z||0)**2);

            // FILTRE ANTI-FICTION : Seuil de Nyquist
            // On ignore les vibrations < 0.2 m/s² pour éviter la dérive à l'arrêt
            if (a_res < 0.2) a_res = 0;

            // Intégration Vitesse (Frottement de l'air simulé à 2%)
            this.speed = this.speed.plus(new BigNumber(a_res).times(dt)).times(Math.pow(0.98, dt));
            
            const kmh = this.speed.times(3.6);
            document.getElementById('sp-main').innerText = kmh.toFixed(2) + " KM/H";

            // CALCUL DU RATIO ALPHA RÉEL
            // Comparaison de ta vitesse relative à la vitesse orbitale VSOP
            const c = 299792.458; // km/s
            const v_relative = this.v_orbitale_cache.plus(this.speed.div(1000));
            const current_alpha = v_relative.div(c);
            
            document.getElementById('val-alpha').innerText = current_alpha.toExponential(10);

            // SCELLEMENT DE RÉALITÉ
            const seal = document.getElementById('reality-seal');
            const diff_alpha = current_alpha.minus(this.alpha_constant).abs();
            
            // Si l'écart à Alpha est cohérent avec le mouvement
            if (this.speed.gt(0.5) && a_res > 0) {
                seal.innerText = "SUTURE PHYSIQUE ACTIVE : CHAMP TOTAL COHÉRENT";
                seal.style.color = "#00ff88";
            } else {
                seal.innerText = "REPOS QUANTIQUE : ATTENTE DE VECTEUR";
                seal.style.color = "#888";
            }
        });

        window.addEventListener('deviceorientation', (e) => {
            // Sextant : On affiche l'inclinaison par rapport à l'écliptique
            document.getElementById('val-tilt').innerText = e.beta.toFixed(2) + "°";
        });
    }
};
</script>
</body>
</html>
