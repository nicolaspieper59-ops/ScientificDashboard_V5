<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI V29 | LE SOUVERAIN</title>
    <style>
        :root { --neon: #00ff88; --alpha: #00d2ff; --bg: #030303; --warn: #ffaa00; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .card { border: 1px solid #222; padding: 10px; background: rgba(0,0,0,0.8); }
        .full-width { grid-column: span 2; }
        .label { font-size: 0.6rem; color: #666; text-transform: uppercase; }
        .val { font-size: 1.4rem; font-weight: bold; color: var(--neon); }
        
        /* Barre de Conscience */
        #conscience-container { width: 100%; height: 4px; background: #111; margin: 10px 0; border-radius: 2px; }
        #conscience-bar { width: 0%; height: 100%; background: var(--alpha); transition: width 0.3s; }
        
        #video-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.1; object-fit: cover; filter: grayscale(1); }
        .big-v { font-size: 3.5rem; text-align: center; display: block; margin: 10px 0; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline></video>

    <div id="conscience-container"><div id="conscience-bar"></div></div>
    <div id="status-text" style="font-size: 0.6rem; text-align: center; color: var(--alpha);">DÉDUCTION DE L'ANATOMIE... (0%)</div>

    <div class="dashboard">
        <div class="card full-width">
            <span class="val big-v" id="sp-main">--</span>
            <div class="label" style="text-align: center;">KM/H (Vitesse Centre)</div>
        </div>

        <div class="card">
            <div class="label">🚴 Vitesse max</div>
            <div id="v-max" class="val">0.0</div>
        </div>
        <div class="card">
            <div class="label">Ø Vitesse moy</div>
            <div id="v-moy" class="val">0.0</div>
        </div>

        <div class="card">
            <div class="label">🏔 Altitude</div>
            <div id="val-alt" class="val">--</div>
        </div>
        <div class="card">
            <div class="label">± Dénivelé</div>
            <div id="val-deniv" class="val">0m</div>
        </div>

        <div class="card">
            <div class="label">📍 Précision</div>
            <div id="val-acc" class="val" style="color: var(--warn);">--</div>
        </div>
        <div class="card">
            <div class="label">⌛ Attente moy</div>
            <div id="wait-avg" class="val">--</div>
        </div>

        <div class="card">
            <div class="label">⌚ Départ</div>
            <div id="time-start" class="val">--:--</div>
        </div>
        <div class="card">
            <div class="label">⏱ Durée</div>
            <div id="time-dur" class="val">00m 00s</div>
        </div>

        <div class="card full-width">
            <div class="label">⌛ Temps d'attente total</div>
            <div id="time-wait" class="val" style="color: var(--warn);">0m 0s</div>
        </div>
    </div>

    <button id="ignite" style="width:100%; padding:20px; background:white; color:black; margin-top:10px; font-weight:bold;">ACTIVER SUTURE</button>

<script>
const OMNI = {
    stats: {
        max: 0, sum: 0, count: 0, start: null, 
        waitTotal: 0, lastMove: Date.now(), 
        altStart: null, deniv: 0
    },
    anatomy: { r_cam: 0, confidence: 0 },
    v_last: 0,

    async init() {
        document.getElementById('ignite').style.display = 'none';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video-bg').srcObject = stream;
        
        this.initSensors();
        this.loop();
    },

    initSensors() {
        // Baromètre pour altitude et dénivelé
        if ('Barometer' in window) {
            const baro = new Barometer({ frequency: 5 });
            baro.onreading = () => {
                const alt = 44330 * (1 - Math.pow(baro.pressure / 1013.25, 1/5.255));
                if (this.stats.altStart === null) this.stats.altStart = alt;
                this.stats.deniv = alt - this.stats.altStart;
                document.getElementById('val-alt').innerText = alt.toFixed(0) + "m";
                document.getElementById('val-deniv').innerText = (this.stats.deniv >= 0 ? "+" : "") + this.stats.deniv.toFixed(1) + "m";
            };
            baro.start();
        }

        // GPS pour Précision
        navigator.geolocation.watchPosition(p => {
            document.getElementById('val-acc').innerText = "±" + p.coords.accuracy.toFixed(1) + "m";
        }, null, {enableHighAccuracy: true});
    },

    loop() {
        const update = () => {
            // Ici, on simule l'acquisition de vitesse V (à remplacer par ton calcul optique/gps)
            let v_brute = this.getVitesseFictive(); 
            
            // 1. AUTO-ANATOMIE (Dépôt automatique du rayon r)
            if (this.anatomy.confidence < 100) {
                this.anatomy.confidence += 0.2; 
                document.getElementById('conscience-bar').style.width = this.anatomy.confidence + "%";
                document.getElementById('status-text').innerText = `CONSCIENCE MATÉRIELLE... (${Math.floor(this.anatomy.confidence)}%)`;
            } else {
                document.getElementById('status-text').innerText = "SUTURE PHYSIQUE VERROUILLÉE";
                
                // 2. CALCUL DES STATS (Une fois la conscience acquise)
                this.processStats(v_brute);
            }

            requestAnimationFrame(update);
        };
        update();
    },

    processStats(v) {
        if (v > 0.15) {
            // Verrouillage de l'heure de départ
            if (!this.stats.start) {
                this.stats.start = Date.now();
                document.getElementById('time-start').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }

            // Vitesse Max & Moyenne
            if (v > this.stats.max) this.stats.max = v;
            this.stats.sum += v;
            this.stats.count++;
            
            this.stats.lastMove = Date.now();
            document.getElementById('sp-main').innerText = (v * 3.6).toFixed(1);
        } else {
            // Gestion de l'attente
            this.stats.waitTotal += (16.6 / 1000); // approx ms par frame
            document.getElementById('sp-main').innerText = "0";
        }

        // Mise à jour UI
        document.getElementById('v-max').innerText = (this.stats.max * 3.6).toFixed(1);
        const moy = (this.stats.sum / this.stats.count) * 3.6;
        document.getElementById('v-moy').innerText = isNaN(moy) ? "0.0" : moy.toFixed(1);
        
        if (this.stats.start) {
            const dur = Math.floor((Date.now() - this.stats.start) / 1000);
            document.getElementById('time-dur').innerText = `${Math.floor(dur/60)}m ${dur%60}s`;
            document.getElementById('time-wait').innerText = `${Math.floor(this.stats.waitTotal/60)}m ${Math.floor(this.stats.waitTotal%60)}s`;
        }
    },

    getVitesseFictive() { return 0; } // À lier à tes capteurs réels
};

document.getElementById('ignite').addEventListener('click', () => OMNI.init());
</script>
</body>
                                           </html>
