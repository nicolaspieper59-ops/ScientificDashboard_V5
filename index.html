<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OMEGA SUTURE v4000 | Sextant & Cosmos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bignumber.js/9.1.2/bignumber.min.js"></script>
    <style>
        :root { --neon: #00ff88; --gold: #ffd700; --bg: #020202; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow-x: hidden; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 5px; }
        .stat-card { border: 1px solid #333; padding: 10px; background: rgba(0,0,0,0.8); position: relative; }
        .label { color: #888; font-size: 0.6rem; text-transform: uppercase; }
        .val { font-size: 1.8rem; color: var(--neon); }
        #camera-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; object-fit: cover; }
        .sextant-line { position: fixed; top: 50%; left: 0; width: 100%; height: 2px; background: var(--gold); z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <video id="camera-bg" autoplay playsinline></video>
    <div class="sextant-line"></div>

    <button id="start-btn" style="width:100%; padding:20px; background:var(--neon); font-weight:bold;">INITIALISER LA NAVIGATION ASTRONOMIQUE</button>

    <div class="grid">
        <div class="stat-card">
            <div class="label">Vecteur Cinétique (Terre)</div>
            <div id="val-speed" class="val">-- KM/H</div>
        </div>

        <div class="stat-card" style="border-color: var(--gold);">
            <div class="label">Sextant Numérique (Inclinaison)</div>
            <div id="val-tilt" class="val" style="color:var(--gold);">-- °</div>
        </div>

        <div class="stat-card">
            <div class="label">Pression Gravitationnelle Solaire</div>
            <div id="val-gravity" style="font-size: 0.8rem; color: #00d2ff;">-- m/s² (G-Sol)</div>
        </div>

        <div class="stat-card">
            <div class="label">Position OSM (Sync Géo)</div>
            <div id="val-osm" style="font-size: 0.7rem; color: #aaa;">Recherche satellites...</div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let sys = { speed: new BigNumber(0), lastT: performance.now() };

        // 1. DÉMARRAGE CAMÉRA (Le Sextant)
        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('camera-bg').srcObject = stream;
        }

        // 2. GÉOLOCALISATION (OpenStreetMap / GPS)
        function updateOSM() {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                document.getElementById('val-osm').innerText = `LAT: ${lat.toFixed(5)} | LON: ${lon.toFixed(5)} (VIA OSM)`;
                // Ici, on pourrait injecter une carte statique OSM en fond
            }, null, { enableHighAccuracy: true });
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('start-btn').style.display = 'none';
            isRunning = true;
            initCamera();
            updateOSM();
            if (typeof DeviceOrientationEvent.requestPermission === 'function') await DeviceOrientationEvent.requestPermission();
            if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
        });

        // 3. CAPTEURS DE LUMIÈRE
        if ('AmbientLightSensor' in window) {
            const light = new AmbientLightSensor();
            light.addEventListener('reading', () => {
                console.log("Luminosité:", light.illuminance);
            });
            light.start();
        }

        // 4. CALCUL GRAVITATION SOLAIRE (Zéro Fiction)
        function getSolarGravity() {
            // G * MasseSoleil / Dist² (approx 1 UA)
            const gSol = new BigNumber('0.00593'); 
            document.getElementById('val-gravity').innerText = gSol.toFixed(5) + " m/s² (Influence Solaire)";
            return gSol;
        }

        // 5. FUSION DES DONNÉES
        window.addEventListener('deviceorientation', (e) => {
            if(!isRunning) return;
            document.getElementById('val-tilt').innerText = e.beta.toFixed(2) + "°";
        });

        window.addEventListener('devicemotion', (e) => {
            if(!isRunning) return;
            const now = performance.now();
            const dt = (now - sys.lastT) / 1000;
            sys.lastT = now;

            // Vitesse avec compensation gravitationnelle solaire
            let a = new BigNumber(e.acceleration.y || 0).abs();
            let gSol = getSolarGravity();
            
            // On soustrait l'influence solaire pour isoler la vitesse terrestre
            let cleanA = a.minus(gSol); 
            if(cleanA.lt(0.1)) cleanA = new BigNumber(0);

            sys.speed = sys.speed.plus(cleanA.times(dt)).times(0.98);
            document.getElementById('val-speed').innerText = sys.speed.times(3.6).toFixed(2) + " KM/H";
        });

    </script>
</body>
</html>
