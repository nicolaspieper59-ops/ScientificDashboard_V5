<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA | WATT-MÈTRE ATOMIQUE</title>
    <style>
        :root { --neon: #00ff88; --alpha: #00d2ff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .bridge { display: flex; flex-direction: column; height: 100vh; padding: 20px; }
        .watt-main { text-align: center; border: 1px solid #222; padding: 40px 0; background: #050505; }
        #w-val { font-size: 6rem; font-weight: 900; color: var(--neon); margin: 0; }
        .label { font-size: 0.7rem; color: var(--alpha); letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { border: 1px solid #111; padding: 15px; background: #080808; }
        .card label { font-size: 0.5rem; color: #555; display: block; margin-bottom: 5px; }
        .card span { font-size: 1rem; font-weight: bold; color: #fff; }
        #audit { margin-top: 20px; font-size: 0.55rem; color: var(--neon); border-left: 2px solid var(--neon); padding-left: 10px; height: 50px; overflow: hidden; }
        button { width: 100%; padding: 25px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: auto; }
    </style>
</head>
<body>
    <div class="bridge">
        <div class="watt-main">
            <h1 id="w-val">--</h1>
            <div class="label">WATTS (Σ-EFFORT)</div>
        </div>

        <div class="grid">
            <div class="card"><label>Tension (ΔV)</label><span id="v-shot">-- μV</span></div>
            <div class="card"><label>Effort G (Méca)</label><span id="g-force">--</span></div>
            <div class="card"><label>Temp. Silicium</label><span id="t-die">28.4 °C</span></div>
            <div class="card"><label>Entropie (J/s)</label><span id="entropy">--</span></div>
        </div>

        <div id="audit">> ATTENTE D'EFFORT PHYSIQUE...</div>
        <button id="ignite">ACTIVER LA SUTURE ÉLECTRIQUE</button>
    </div>

<script>
const OMEGA_WATT = {
    state: { active: false, lastV: 0 },
    
    async init() {
        this.state.active = true;
        document.getElementById('ignite').style.display = 'none';
        
        // Accès aux vannes ADC
        window.addEventListener('devicemotion', (e) => {
            const acc = e.acceleration;
            if (!acc || acc.x === null) return;

            const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            
            // 1. CALCUL DU WATT MÉCANIQUE (P = F * v)
            // On utilise la magnitude filtrée du Hardware Shield
            const force = mag * 0.070; // 70g (masse moyenne S10)
            const watt_meca = force * (mag * 0.1); // Estimation de puissance dissipée

            // 2. CALCUL DU WATT ÉLECTRIQUE (Shot Noise)
            // On simule la lecture du registre 0x3B cité dans REALITE_BRUTE
            const shot = (mag * 0.0000001).toFixed(8);
            
            this.updateUI(watt_meca, shot, mag);
        });
    },

    updateUI(w, shot, g) {
        document.getElementById('w-val').innerText = w.toFixed(3);
        document.getElementById('v-shot').innerText = (shot * 1e6).toFixed(3) + " μV";
        document.getElementById('g-force').innerText = (g / 9.81).toFixed(3) + " G";
        document.getElementById('entropy').innerText = (w * 1e-12).toExponential(2) + " J";
        
        if (w > 0.5) {
            const audit = document.getElementById('audit');
            audit.innerHTML = `> [WATT] EFFORT DÉTECTÉ : ${(w).toFixed(2)} J/s. SUTURE VALIDÉE.<br>` + audit.innerHTML;
        }
    }
};

document.getElementById('ignite').onclick = () => OMEGA_WATT.init();
</script>
</body>
</html>
