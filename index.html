<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA V70 | AUTONOMIE TOTALE</title>
    <style>
        :root { --neon: #00ff88; --alpha: #00d2ff; --bg: #000; --red: #ff003c; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        .matrix { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .e { height: 10px; background: #111; border: 1px solid #222; font-size: 0.4rem; text-align: center; color: #333; }
        .e.active { border-color: var(--neon); color: var(--neon); }
        .v-main { font-size: 6rem; font-weight: 900; text-align: center; color: var(--neon); margin: 0; }
        .source-tag { font-size: 0.7rem; text-align: center; color: var(--alpha); text-transform: uppercase; margin-bottom: 15px; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .card { border: 1px solid #1a1a1a; padding: 8px; font-size: 0.8rem; }
        .label { font-size: 0.5rem; color: #555; display: block; }
        button { width: 100%; padding: 25px; background: #fff; font-weight: bold; border: none; margin-top: 15px; cursor: pointer; }
        #video-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.1; object-fit: cover; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline muted></video>
    <div class="matrix" id="matrix"></div>

    <div style="border: 2px solid #222; padding: 20px; background: rgba(0,0,0,0.9);">
        <div id="v-display" class="v-main">0.000</div>
        <div id="source" class="source-tag">SUTURE INERTIELLE (IMU + OPTIC)</div>

        <div class="card-grid">
            <div class="card"><span class="label">Accélération G</span><span id="acc-g">0.00</span></div>
            <div class="card"><span class="label">Confiance Flux</span><span id="flow-conf">--</span></div>
            <div class="card"><span class="label">Inertie Pure</span><span id="v-inertial">0.0 km/h</span></div>
            <div class="card"><span class="label">Statut GNSS</span><span id="gps-status">OFFLINE</span></div>
        </div>
    </div>

    <button id="ignite">DÉMARRAGE IMMÉDIAT (SANS GPS)</button>

<script>
        const OMEGA = {
    v_inertielle: 0,
    last_t: performance.now(),
    v_filtree: 0,
    
    // Paramètres de Suture
    KA: 0.1, // Coefficient d'amortissement (Friction naturelle)
    SEUIL_BRUIT: 0.25, // Seuil pour ignorer les micro-vibrations

    async init() {
        // ... (Garder l'init caméra/micro de ta V70)
        this.initInertie();
        this.loop();
    },

    initInertie() {
        window.addEventListener('devicemotion', (e) => {
            const now = performance.now();
            const dt = (now - this.last_t) / 1000;
            this.last_t = now;

            // 1. Extraction de l'accélération LINEAIRE (sans gravité)
            // Sur S10, e.acceleration est déjà filtré pour retirer G
            const acc = e.acceleration;
            const a_inst = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

            // 2. FILTRE DE VÉRITÉ (Anti-Saut Moisi)
            // Si l'accélération est trop faible, on considère que c'est du bruit
            if (a_inst > this.SEUIL_BRUIT) {
                // Intégration de Riemann
                this.v_inertielle += a_inst * dt;
                document.getElementById('e1').classList.add('active'); // État Inertie
            } else {
                // SUTURE DE REPOS : Si pas d'accélération, la vitesse chute
                // selon une loi de friction quadratique (Physique des fluides)
                this.v_inertielle *= (1 - this.KA * dt);
                document.getElementById('e1').classList.remove('active');
            }

            // 3. AFFICHAGE DES FORCES G
            document.getElementById('acc-g').innerText = (a_inst / 9.80665).toFixed(3) + " G";
        });
    },

    loop() {
        const frame = () => {
            // Conversion en km/h
            let kmh = this.v_inertielle * 3.6;
            
            // Correction par le GPS (si disponible et précis < 3m)
            // On ne remplace pas, on "recale" doucement
            if (this.v_gps_valide) {
                 this.v_inertielle = (this.v_inertielle * 0.98) + (this.v_gps_source * 0.02);
            }

            document.getElementById('v-display').innerText = kmh.toFixed(3);
            requestAnimationFrame(frame);
        };
        frame();
    }
};
</script>
</body>
</html>
