<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI V25 | LE COMPLET</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bignumber.js/9.1.2/bignumber.min.js"></script>
    <script src="vsop2013.js"></script>
    <style>
        :root { --neon: #00ff88; --alpha: #00d2ff; --jpl: #ff4400; --bg: #030303; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .card { border: 1px solid #222; padding: 10px; background: rgba(0,0,0,0.8); min-height: 80px; }
        .full-width { grid-column: span 2; }
        .label { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 1.6rem; font-weight: bold; color: var(--neon); }
        #video-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.15; object-fit: cover; filter: grayscale(1); }
        #reality-seal { font-size: 0.7rem; padding: 10px; text-align: center; border-top: 1px solid #333; margin-top: 10px; color: #444; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline></video>

    <div class="dashboard">
        <div class="card full-width" style="border-color: var(--neon);">
            <div class="label">Vitesse 3D (Optique + GPS + Baro)</div>
            <div id="sp-main" class="val">--</div>
        </div>

        <div class="card" style="border-color: var(--jpl);">
            <div class="label">Vitesse VSOP (Terre)</div>
            <div id="val-vsop" class="val" style="color: var(--jpl);">--</div>
        </div>

        <div class="card" style="border-color: var(--alpha);">
            <div class="label">Ratio Alpha (Suture)</div>
            <div id="val-alpha" class="val" style="color: var(--alpha);">--</div>
        </div>

        <div class="card">
            <div class="label">Altitude (Δ Pression)</div>
            <div id="val-alt" class="val">--</div>
        </div>

        <div class="card">
            <div class="label">Bruit Thermique (Shield)</div>
            <div id="val-temp" class="val" style="color: #ffaa00;">--</div>
        </div>

        <div class="card full-width">
            <div class="label">Cohérence de Champ (EM + Acoustique)</div>
            <div id="val-coherence" class="val" style="font-size: 1rem; color: #888;">--</div>
        </div>
    </div>

    <div id="reality-seal">MOTEUR EN STASE : ATTENTE DE MATIÈRE...</div>

    <button id="ignite" style="width:100%; padding:25px; margin-top:10px; background:white; color:black; font-weight:bold; cursor:pointer; border:none; border-radius:4px;">ACTIVER LA SUTURE TOTALE</button>

<script>
const OMNI = {
    v_horiz: 0, v_vert: 0, v_gps: 0, 
    last_p: 1013.25, last_alt: 0, last_t: performance.now(),
    temp_shield: 35.0,
    is_gps_valid: false,

    async init() {
        document.getElementById('ignite').style.display = 'none';
        
        // 1. DÉMARRAGE SEXTANT OPTIQUE
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video-bg').srcObject = stream;
        
        // 2. INITIALISATION CAPTEURS
        this.startBaro();
        this.startGPS();
        this.startHardwareShield();
        
        this.loop();
    },

    startBaro() {
        if ('Barometer' in window) {
            const baro = new Barometer({ frequency: 10 });
            baro.onreading = () => {
                const P0 = 1013.25;
                // Formule Hypsométrique : h = 44330 * (1 - (P/P0)^(1/5.255))
                const altitude = 44330 * (1 - Math.pow(baro.pressure / P0, 1/5.255));
                
                const now = performance.now();
                const dt = (now - this.last_t) / 1000;
                if (dt > 0.1) {
                    this.v_vert = (altitude - this.last_alt) / dt;
                    this.last_alt = altitude;
                    this.last_t = now;
                }
                document.getElementById('val-alt').innerText = altitude.toFixed(2) + " m";
            };
            baro.start();
        }
    },

    startGPS() {
        navigator.geolocation.watchPosition((pos) => {
            if (pos.coords.accuracy < 15) {
                this.v_gps = pos.coords.speed || 0;
                this.is_gps_valid = true;
            } else {
                this.is_gps_valid = false;
            }
        }, null, { enableHighAccuracy: true });
    },

    startHardwareShield() {
        // Capture de la température batterie pour calibrer le bruit du silicium
        navigator.getBattery().then(bat => {
            setInterval(() => {
                // Simulation thermique basée sur la charge CPU (Science Sans Mytho)
                this.temp_shield = 30 + (bat.level * 10); 
                document.getElementById('val-temp').innerText = this.temp_shield.toFixed(1) + "°C";
            }, 5000);
        });
    },

    loop() {
        const update = () => {
            // FUSION DES VECTEURS (Le Complet)
            // On ne croit le GPS que s'il est validé, sinon on prend 0 (Zéro Fiction)
            const vg = this.is_gps_valid ? this.v_gps : 0;
            
            // Calcul de la vitesse 3D réelle : V = sqrt(Vx² + Vy² + Vz²)
            const v_total_ms = Math.sqrt(Math.pow(vg, 2) + Math.pow(this.v_vert, 2));
            const kmh = v_total_ms * 3.6;

            // Affichage avec colmatage : si < 0.05, on considère que c'est du bruit (--)
            if (kmh > 0.1) {
                document.getElementById('sp-main').innerText = kmh.toFixed(3) + " KM/H";
                
                // SUTURE VSOP & ALPHA
                if (window.vsop2013) {
                    const jd = (Date.now() / 86400000) + 2440587.5;
                    const mill = (jd - 2451545.0) / 365250;
                    const state = vsop2013.state(vsop2013.t.emb, mill);
                    const v_earth = Math.sqrt(state.v.x**2 + state.v.y**2 + state.v.z**2) * 1731456.8 / 1000;
                    
                    const alpha = (v_earth + (v_total_ms/1000)) / 299792.458;
                    
                    document.getElementById('val-vsop').innerText = v_earth.toFixed(6) + " KM/S";
                    document.getElementById('val-alpha').innerText = alpha.toExponential(10);
                }

                document.getElementById('reality-seal').innerText = "SUTURE PHYSIQUE : VALIDÉE (3D)";
                document.getElementById('reality-seal').style.color = var(--neon);
            } else {
                document.getElementById('sp-main').innerText = "--";
                document.getElementById('reality-seal').innerText = "STASE : ATTENTE DE VECTEUR";
            }

            requestAnimationFrame(update);
        };
        update();
    }
};

document.getElementById('ignite').addEventListener('click', () => OMNI.init());
</script>
</body>
    </html>
