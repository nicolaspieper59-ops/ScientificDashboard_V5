<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinelle - Traqueur Céleste 4D</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 20px; }
        .planet-card { border: 1px solid #00ff41; padding: 10px; background: rgba(0, 255, 65, 0.05); }
        .header { border-bottom: 2px solid #00ff41; padding: 10px; margin-bottom: 10px; }
        .value { color: #ffffff; font-weight: bold; }
        .status { color: #ffae00; }
    </style>
</head>
<body>

<div class="header">
    <h1>STATION SENTINELLE - SYNC UTC 0</h1>
    <p>GPS: <span id="gps-pos" class="value">En attente...</span> | Météo: <span id="weather-status" class="value">Scan en cours...</span></p>
</div>

<div id="display" class="grid"></div>

<script src="vsop2013.js"></script>

<script>
    // Configuration
    const API_KEY_WEATHER = 'TON_API_KEY_OPENWEATHER'; 
    const planets = ["Sun", "Moon", "Mercury", "Venus", "Mars", "Jupiter", "Saturn", "Uranus", "Neptune"];
    let userCoords = { lat: 0, lon: 0, alt: 0 };
    let cloudCover = 0;

    // 1. Initialisation du GPS
    function initGPS() {
        navigator.geolocation.watchPosition((pos) => {
            userCoords.lat = pos.coords.latitude;
            userCoords.lon = pos.coords.longitude;
            userCoords.alt = pos.coords.altitude || 0;
            document.getElementById('gps-pos').innerText = `${userCoords.lat.toFixed(6)}°, ${userCoords.lon.toFixed(6)}°`;
            updateCelestialBody();
        }, err => console.error("GPS Error", err), { enableHighAccuracy: true });
    }

    // 2. Météo en temps réel (Vercel compatible)
    async function fetchWeather() {
        try {
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${userCoords.lat}&lon=${userCoords.lon}&appid=${API_KEY_WEATHER}`);
            const data = await response.json();
            cloudCover = data.clouds.all;
            document.getElementById('weather-status').innerText = `Nuages: ${cloudCover}% | Visibilité: ${data.visibility / 1000}km`;
        } catch (e) { document.getElementById('weather-status').innerText = "Erreur API"; }
    }

    // 3. Logique de calcul (Pont entre VSOP et Topocentre)
    function calculateBodyData(body) {
        const now = new Date();
        // Ici, on appelle les fonctions de ton vsop2013.js
        // VSOP donne généralement des coordonnées rectangulaires (x,y,z)
        // Note: La conversion RA/DEC -> Alt/Az nécessite le Temps Sidéral Local
        
        const placeholderData = {
            altitude: (Math.random() * 90).toFixed(2), // À remplacer par vsop2013.getAlt()
            direction: (Math.random() * 360).toFixed(2), // À remplacer par vsop2013.getAz()
            appMag: (Math.random() * -5).toFixed(2),
            visibility: cloudCover > 80 ? "LOW" : "HIGH"
        };
        
        return placeholderData;
    }

    // 4. Mise à jour de l'affichage
    function updateCelestialBody() {
        const container = document.getElementById('display');
        container.innerHTML = '';

        planets.forEach(p => {
            const data = calculateBodyData(p);
            const card = document.createElement('div');
            card.className = 'planet-card';
            card.innerHTML = `
                <h3>${p.toUpperCase()}</h3>
                Altitude: <span class="value">${data.altitude}°</span><br>
                Direction: <span class="value">${data.direction}°</span><br>
                Apparent Mag: <span class="value">${data.appMag}</span><br>
                Adjusted Mag: <span class="value">${(parseFloat(data.appMag) + (cloudCover/100)).toFixed(2)}</span><br>
                Visibility: <span class="value">${data.visibility}</span>
            `;
            container.appendChild(card);
        });
    }

    // Lancement
    initGPS();
    setInterval(updateCelestialBody, 1000); // Mise à jour chaque seconde
    setInterval(fetchWeather, 600000); // Météo toutes les 10 min
</script>
</body>
</html>
