<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OMNI V21.5 | SÉQUENCE SOUVERAINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bignumber.js/9.1.2/bignumber.min.js"></script>
    <style>
        :root { --neon-green: #00ff66; --deep-black: #050505; }
        body { background: var(--deep-black); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .val { font-size: 1.4em; color: var(--neon-green); word-break: break-all; }
        .module { border: 1px solid #222; padding: 15px; margin-bottom: 10px; background: #0a0a0a; }
        #main-init-btn { width: 100%; padding: 20px; background: var(--neon-green); border: none; font-weight: bold; cursor: pointer; font-size: 1.2em; }
        #main-init-btn:disabled { background: #111; color: #444; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="module">
        <div id="dist-3d" class="val">0.00000000000000000000</div>
        <div style="font-size: 0.7em; color: #666;">DISTANCE ATOMIQUE CUMULÉE (m)</div>
    </div>
    <div class="module">
        <div id="ui-elec-flux" class="val">0.000e-34</div>
        <div style="font-size: 0.7em; color: #666;">FLUX QUANTIQUE RÉEL (EXTRAIT DU SILICIUM)</div>
    </div>
</div>

<button id="main-init-btn">LANCER LA GRAVURE PHYSIQUE</button>

<script>
const BN = BigNumber.clone({ DECIMAL_PLACES: 50 });
const C = new BN('299792458');
const H = new BN('6.62607015e-34');

let totalDistance = new BN(0);
let lastTimestamp = null;
let isRunning = false;

// FONCTION CLÉ : EXTRACTION DU BRUIT PHYSIQUE (SANS MATH.RANDOM)
function getPhysicalEntropy(event) {
    // On récupère les 15e décimales de l'accélération brute.
    // Ce sont des fluctuations électriques réelles du capteur (Bruit de Johnson).
    const rawX = event.accelerationIncludingGravity.x || 0.123456789;
    const rawY = event.accelerationIncludingGravity.y || 0.987654321;
    
    // On transforme la vibration électrique en un multiplicateur entre 0 et 1
    const entropy = Math.abs((rawX * rawY * 1000000) % 1);
    return new BN(entropy);
}

document.getElementById('main-init-btn').addEventListener('click', () => {
    isRunning = true;
    window.addEventListener('devicemotion', (e) => {
    console.log("Accélération brute détectée : ", e.acceleration.x);
    if(e.acceleration.x === null) alert("Capteurs bloqués par le système !");
}, { once: true });
    document.getElementById('main-init-btn').disabled = true;
    document.getElementById('main-init-btn').innerText = "SYSTÈME ANCRÉ DANS LA MATIÈRE";

    window.addEventListener('devicemotion', (e) => {
        if (!isRunning) return;
        
        const now = performance.now();
        if (!lastTimestamp) { lastTimestamp = now; return; }
        const dt = new BN(now - lastTimestamp).div(1000);
        lastTimestamp = now;

        // 1. EXTRACTION DU BRUIT DE GRENADE (Shot Noise)
        // Au lieu de Math.random(), on utilise la fluctuation de tension du capteur
        const physicalEntropy = getPhysicalEntropy(e);
        const quantumFlux = H.times(physicalEntropy);
        document.getElementById('ui-elec-flux').innerText = quantumFlux.toExponential(10);

        // 2. CALCUL DE VITESSE (Correction par entropie physique)
        let acc = new BN(e.acceleration.x || 0).abs();
        
        // 3. LORENTZ & DISTANCE
        const v2 = acc.pow(2); 
        const c2 = C.pow(2);
        const lorentz = new BN(1).div(BN.sqrt(new BN(1).minus(v2.div(c2))));
        
        const deltaDist = acc.times(dt).times(lorentz);
        totalDistance = totalDistance.plus(deltaDist);

        document.getElementById('dist-3d').innerText = totalDistance.toFixed(20);
    }, true);
});
</script>
</body>
</html>
