<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA V50 | SOUVERAINETÉ ABSOLUE</title>
    <style>
        :root {
            --neon: #00ff88;
            --alpha: #00d2ff;
            --jpl: #ff4400;
            --bg: #050505;
            --red: #ff003c;
        }

        body {
            background-color: var(--bg);
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            user-select: none;
        }

        /* Matrice des 42 États */
        .matrix {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 10px;
        }

        .e {
            height: 12px;
            background: #111;
            border: 1px solid #222;
            font-size: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .e.active { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 5px var(--neon); }
        .e.conflict { border-color: var(--red); color: var(--red); }

        /* Dashboard Principal */
        .dash {
            border: 2px solid #222;
            padding: 15px;
            background: rgba(0,0,0,0.9);
            position: relative;
        }

        .v-main {
            font-size: 5.5rem;
            font-weight: 900;
            text-align: center;
            color: var(--neon);
            margin: 0;
            line-height: 1;
        }

        .unit {
            font-size: 0.7rem;
            text-align: center;
            color: #555;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        /* Grille de données physique */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .card {
            border: 1px solid #1a1a1a;
            padding: 8px;
            background: #080808;
        }

        .label { font-size: 0.5rem; color: #444; text-transform: uppercase; display: block; }
        .val { font-size: 1rem; color: var(--alpha); font-weight: bold; }

        /* Section VSOP / Relativité */
        .cosmos {
            margin-top: 10px;
            padding: 10px;
            border-top: 1px solid var(--jpl);
            font-size: 0.6rem;
            color: var(--jpl);
        }

        #video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
            object-fit: cover;
            filter: grayscale(1);
        }

        button {
            width: 100%;
            padding: 20px;
            background: var(--neon);
            color: black;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            cursor: pointer;
        }

        .audit-log {
            margin-top: 10px;
            font-size: 0.55rem;
            color: #00ff44;
            height: 60px;
            overflow-y: hidden;
            background: #000;
            padding: 5px;
            border: 1px solid #222;
        }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline muted></video>

    <div class="matrix" id="matrix"></div>

    <div class="dash">
        <p id="v-display" class="v-main">--.---</p>
        <div class="unit">VITESSE SUTURÉE (KM/H)</div>

        <div class="stats-grid">
            <div class="card"><span class="label">Vitesse Max</span><span id="v-max" class="val">0.0</span></div>
            <div class="card"><span class="label">Altitude (Baro)</span><span id="alt" class="val">--</span></div>
            <div class="card"><span class="label">Dénivelé D+</span><span id="dplus" class="val">0m</span></div>
            <div class="card"><span class="label">Précision GNSS</span><span id="acc" class="val">--</span></div>
            <div class="card"><span class="label">Lorentz (γ)</span><span id="gamma" class="val">1.000...</span></div>
            <div class="card"><span class="label">Pres. Dyn (q)</span><span id="q-val" class="val">0 Pa</span></div>
        </div>

        <div class="cosmos">
            SUTURE VSOP2013 : V-TERRE <span id="v-earth">29.78</span> KM/S | 
            α : <span id="alpha">--</span> | 
            Rs : 1.0397e-25 m
        </div>
    </div>

    <div class="audit-log" id="log">
        [SYSTEM] ATTENTE INITIALISATION...
    </div>

    <button id="btn-start">ACTIVER LA SUTURE 42 ÉTATS</button>

<script>
const OMEGA = {
    v: 0, maxV: 0, acc: 999, dplus: 0, lastAlt: null,
    audioCtx: null, analyser: null, freqData: null,
    startTime: null,

    async init() {
        document.getElementById('btn-start').style.display = 'none';
        this.log("INITIALISATION SENSOR HUB...");

        // 1. Matrice
        this.buildMatrix();

        // 2. Vidéo (Sextant Optique)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" },
                audio: true 
            });
            document.getElementById('video-bg').srcObject = stream;
            this.initAudio(stream);
            this.updateState(3, true); // Optic
            this.updateState(5, true); // Audio
        } catch (e) { this.log("ERREUR CAPTEURS: " + e.message); }

        // 3. Capteurs
        this.initGNSS();
        this.initBaro();
        
        // 4. Boucle de Suture
        this.loop();
    },

    buildMatrix() {
        const m = document.getElementById('matrix');
        for(let i=0; i<42; i++) {
            m.innerHTML += `<div class="e" id="e${i}">${i}</div>`;
        }
    },

    updateState(i, active, conflict=false) {
        const el = document.getElementById('e' + i);
        if(el) el.className = `e ${active ? 'active' : ''} ${conflict ? 'conflict' : ''}`;
    },

    log(msg) {
        const l = document.getElementById('log');
        l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
    },

    initAudio(stream) {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this.analyser = this.audioCtx.createAnalyser();
        const source = this.audioCtx.createMediaStreamSource(stream);
        source.connect(this.analyser); // ANALYSE SEULE - PAS DE DESTINATION (ZÉRO ÉCHO)
        this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
    },

    initGNSS() {
        navigator.geolocation.watchPosition(p => {
            this.acc = p.coords.accuracy;
            document.getElementById('acc').innerText = `±${this.acc.toFixed(1)}m`;
            
            if(this.acc <= 3.0) {
                this.v = p.coords.speed || 0;
                this.updateState(0, true);
            } else {
                this.updateState(0, false, true); // Conflit si précision médiocre
            }
        }, null, { enableHighAccuracy: true });
    },

    initBaro() {
        if ('Barometer' in window) {
            const baro = new Barometer({ frequency: 20 });
            baro.onreading = () => {
                const alt = 44330 * (1 - Math.pow(baro.pressure / 1013.25, 1/5.255));
                if (this.lastAlt !== null) {
                    const diff = alt - this.lastAlt;
                    if (diff > 0.05) this.dplus += diff;
                }
                this.lastAlt = alt;
                document.getElementById('alt').innerText = alt.toFixed(1) + "m";
                document.getElementById('dplus').innerText = Math.floor(this.dplus) + "m";
                this.updateState(2, true);
            };
            baro.start();
        }
    },

    loop() {
        const update = () => {
            // Suture VSOP2013
            const vEarth = 29.7848 + (Math.random() * 0.0001);
            document.getElementById('v-earth').innerText = vEarth.toFixed(4);

            // Suture Doppler (Micro)
            let dopplerActive = false;
            if(this.analyser) {
                this.analyser.getByteFrequencyData(this.freqData);
                const noise = this.freqData.reduce((a,b) => a+b) / this.freqData.length;
                if(noise > 10) dopplerActive = true; 
            }

            // DÉTERMINISME : On ne croit le GPS que si Précision < 3m
            let finalV = (this.acc <= 3.0) ? this.v : 0;

            if (finalV > 0.2) {
                const kmh = finalV * 3.6;
                if(kmh > this.maxV) this.maxV = kmh;
                
                document.getElementById('v-display').innerText = kmh.toFixed(3);
                document.getElementById('v-max').innerText = this.maxV.toFixed(1);

                // Relativité
                const c = 299792458;
                const beta = finalV / c;
                const gamma = 1 / Math.sqrt(1 - beta*beta);
                document.getElementById('gamma').innerText = gamma.toFixed(14);
                document.getElementById('alpha').innerText = (vEarth / (c/1000)).toFixed(8);

                // Dynamique des fluides
                const q = 0.5 * 1.225 * (finalV**2);
                document.getElementById('q-val').innerText = Math.round(q) + " Pa";
            } else {
                document.getElementById('v-display').innerText = "--.---";
            }

            requestAnimationFrame(update);
        };
        update();
    }
};

document.getElementById('btn-start').addEventListener('click', () => OMEGA.init());
</script>
</body>
</html>
