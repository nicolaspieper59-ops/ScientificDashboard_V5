<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA V200 | TOTAL SENSOR HUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="matrix-42"></div>

    <main class="omniscience">
        <div class="v-main-container">
            <h1 id="v-real">0.000</h1>
            <div class="v-unit">KM/H SUTURÉS (Σ-REALITY)</div>
        </div>

        <div class="sensor-clusters">
            <div class="cluster">
                <h3>CINÉMATIQUE</h3>
                <div class="row"><label>Accélération G</label><span id="val-g">0.000</span></div>
                <div class="row"><label>Rotation (rad/s)</label><span id="val-gyro">0.00</span></div>
                <div class="row"><label>Lorentz (γ)</label><span id="val-gamma">1.000...</span></div>
            </div>

            <div class="cluster">
                <h3>ENVIRONNEMENT</h3>
                <div class="row"><label>Pression (hPa)</label><span id="val-press">--</span></div>
                <div class="row"><label>Lumière (Lux)</label><span id="val-lux">--</span></div>
                <div class="row"><label>Acoustique (dB)</label><span id="val-audio">--</span></div>
            </div>

            <div class="cluster">
                <h3>CHAMPS (EMF)</h3>
                <div class="row"><label>Magnétisme (μT)</label><span id="val-mag">--</span></div>
                <div class="row"><label>Bruit de Shot</label><span id="val-shot">--</span></div>
                <div class="row"><label>Ratio Vérité</label><span id="val-ratio">--</span></div>
            </div>

            <div class="cluster">
                <h3>HARDWARE (S10/TAB)</h3>
                <div class="row"><label>Batterie (mV)</label><span id="val-volt">--</span></div>
                <div class="row"><label>Temp. CPU</label><span id="val-temp">--</span></div>
                <div class="row"><label>Planck Tick</label><span id="val-planck">--</span></div>
            </div>
        </div>

        <div id="audit-trail">SYSTEM READY. ZERO FICTION PROTOCOL ACTIVE.</div>
    </main>

    <div class="footer-actions">
        <button id="ignite">IGNITION</button>
        <button id="seal" class="hidden">SCELLER LE MANIFESTE SHA-256</button>
    </div>

    <script src="engine.js"></script>
</body>
</html>
