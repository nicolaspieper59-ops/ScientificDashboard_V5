<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI 2026 - Souverain</title>
    <style>
        :root { --neon-blue: #00d2ff; --neon-red: #ff3e3e; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        #dashboard { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; padding: 15px; box-sizing: border-box; }
        
        .header { border-bottom: 1px solid var(--neon-blue); padding-bottom: 10px; display: flex; justify-content: space-between; }
        .mode-tag { background: var(--neon-blue); color: black; padding: 2px 8px; font-weight: bold; border-radius: 3px; }

        .main-metrics { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .speed { font-size: 5rem; font-weight: bold; color: var(--neon-blue); }
        .unit { font-size: 1.2rem; opacity: 0.7; }
        .dist { font-size: 2rem; margin-top: 10px; }

        .identity-matrix { background: #111; border-radius: 10px; padding: 15px; margin-top: 20px; width: 100%; }
        .root-bar { height: 6px; background: #333; margin: 10px 0; border-radius: 3px; position: relative; }
        .root-fill { height: 100%; background: var(--neon-blue); transition: width 0.3s; }

        .footer { font-size: 0.8rem; opacity: 0.6; display: flex; justify-content: space-between; border-top: 1px solid #333; padding-top: 10px; }
        canvas { width: 100%; height: 60px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="header">
        <span>STRATÉGIE: 999KM</span>
        <span id="transport-mode" class="mode-tag">INITIALISATION</span>
    </div>

    <div class="main-metrics">
        <div id="speed-val" class="speed">0.00</div>
        <div class="unit">KM/H (FLUX)</div>
        <div id="dist-val" class="dist">000.000 KM</div>
        
        <div class="identity-matrix">
            <div style="font-size: 0.7rem;">ANALYSE RACINES (ENTROPIE)</div>
            <div class="root-bar"><span>√ (Atomes)</span><div id="bar-k2" class="root-fill" style="width: 33%"></div></div>
            <div class="root-bar"><span>∛ (Structure)</span><div id="bar-k3" class="root-fill" style="width: 33%"></div></div>
            <div class="root-bar"><span>∜ (Interface)</span><div id="bar-k4" class="root-fill" style="width: 33%"></div></div>
        </div>
        <canvas id="atomic-canvas"></canvas>
    </div>

    <div class="footer">
        <div>LAT: <span id="lat-val">0.0000</span></div>
        <div>LON: <span id="lon-val">0.0000</span></div>
        <div>INTÉGRITÉ: <span id="int-val">100%</span></div>
    </div>
</div>

<script src="gnss_dashbord_full.js"></script>
</body>
                </html>
