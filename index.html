<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA V70 | AUTONOMIE TOTALE</title>
    <style>
        :root { --neon: #00ff88; --alpha: #00d2ff; --bg: #000; --red: #ff003c; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        .matrix { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .e { height: 10px; background: #111; border: 1px solid #222; font-size: 0.4rem; text-align: center; color: #333; }
        .e.active { border-color: var(--neon); color: var(--neon); }
        .v-main { font-size: 6rem; font-weight: 900; text-align: center; color: var(--neon); margin: 0; }
        .source-tag { font-size: 0.7rem; text-align: center; color: var(--alpha); text-transform: uppercase; margin-bottom: 15px; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .card { border: 1px solid #1a1a1a; padding: 8px; font-size: 0.8rem; }
        .label { font-size: 0.5rem; color: #555; display: block; }
        button { width: 100%; padding: 25px; background: #fff; font-weight: bold; border: none; margin-top: 15px; cursor: pointer; }
        #video-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.1; object-fit: cover; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline muted></video>
    <div class="matrix" id="matrix"></div>

    <div style="border: 2px solid #222; padding: 20px; background: rgba(0,0,0,0.9);">
        <div id="v-display" class="v-main">0.000</div>
        <div id="source" class="source-tag">SUTURE INERTIELLE (IMU + OPTIC)</div>

        <div class="card-grid">
            <div class="card"><span class="label">Accélération G</span><span id="acc-g">0.00</span></div>
            <div class="card"><span class="label">Confiance Flux</span><span id="flow-conf">--</span></div>
            <div class="card"><span class="label">Inertie Pure</span><span id="v-inertial">0.0 km/h</span></div>
            <div class="card"><span class="label">Statut GNSS</span><span id="gps-status">OFFLINE</span></div>
        </div>
    </div>

    <button id="ignite">DÉMARRAGE IMMÉDIAT (SANS GPS)</button>

<script>
const OMEGA = {
    v_inertielle: 0,
    last_t: performance.now(),
    acc_lin: 0,

    async init() {
        document.getElementById('ignite').style.display = 'none';
        this.buildMatrix();

        // 1. DÉMARRAGE IMMÉDIAT DES CAPTEURS INTERNES
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" },
            audio: true 
        });
        document.getElementById('video-bg').srcObject = stream;

        // 2. ACCÉLÉROMÈTRE (La source d'indépendance)
        window.addEventListener('devicemotion', (e) => {
            const dt = (performance.now() - this.last_t) / 1000;
            this.last_t = performance.now();

            // Extraction de l'accélération linéaire (sans pesanteur)
            const ax = e.acceleration.x || 0;
            const ay = e.acceleration.y || 0;
            const az = e.acceleration.z || 0;
            this.acc_lin = Math.sqrt(ax*ax + ay*ay + az*az);

            // Intégration : v = v + a*dt
            if (this.acc_lin > 0.1) { // Seuil de bruit
                this.v_inertielle += this.acc_lin * dt;
            } else {
                this.v_inertielle *= 0.95; // Friction logicielle (évite la dérive infinie)
            }
            
            document.getElementById('acc-g').innerText = (this.acc_lin / 9.81).toFixed(3) + " G";
        });

        // 3. TENTATIVE GPS (En arrière-plan uniquement)
        navigator.geolocation.watchPosition(p => {
            if(p.coords.accuracy <= 5) {
                // Si le GPS est bon, on "recalage" la vitesse inertielle
                const v_gps = p.coords.speed || 0;
                this.v_inertielle = (this.v_inertielle * 0.7) + (v_gps * 0.3);
                document.getElementById('gps-status').innerText = "SUTURÉ (±" + p.coords.accuracy.toFixed(1) + "m)";
            }
        }, null, { enableHighAccuracy: true });

        this.loop();
    },

    buildMatrix() {
        const m = document.getElementById('matrix');
        for(let i=0; i<42; i++) m.innerHTML += `<div class="e" id="e${i}">${i}</div>`;
    },

    loop() {
        const frame = () => {
            const kmh = this.v_inertielle * 3.6;
            document.getElementById('v-display').innerText = kmh.toFixed(3);
            document.getElementById('v-inertial').innerText = kmh.toFixed(1) + " km/h";
            
            requestAnimationFrame(frame);
        };
        frame();
    }
};

document.getElementById('ignite').addEventListener('click', () => OMEGA.init());
</script>
</body>
</html>
