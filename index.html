<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SOUVERAIN : CINÉMATIQUE RÉALISTE</title>
    <style>
        body { background: #000; color: #00ff88; font-family: monospace; padding: 15px; }
        .main-val { font-size: 1.8em; color: #fff; text-shadow: 0 0 10px #00ff88; word-break: break-all; margin-bottom: 20px; border-left: 3px solid #00d2ff; padding-left: 10px; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { border: 1px solid #222; padding: 10px; background: #050505; }
        .label { font-size: 0.7em; color: #555; text-transform: uppercase; display: block; }
        .unit { font-size: 1.2em; color: #00d2ff; font-weight: bold; }
        .vector { font-size: 0.6em; color: #ff0055; margin-top: 5px; }
        button { width: 100%; padding: 25px; background: #00d2ff; color: #000; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="label">Distance Cinématique Absolue (Mètres) :</div>
<div id="val" class="main-val">0.0000000000000000000000000000000000000000</div>

<div class="metrics">
    <div class="card">
        <span class="label">Vélocité Réelle</span>
        <span id="v_ms" class="unit">0.0000</span> <small>m/s</small>
        <div id="v_vec" class="vector">X: 0 | Y: 0 | Z: 0</div>
    </div>
    <div class="card">
        <span class="label">Distance Humaine</span>
        <span id="d_m" class="unit">0.0000</span> <small>km</small>
        <div class="vector">Friction 3D Active</div>
    </div>
</div>

<button id="ignite">ACTIVER LA PHYSIQUE DU MATÉRIEL</button>

<script>
const CONFIG = { PRECISION: 10n ** 40n, STORAGE: "CINEMATIQUE_REAL_42" };

let state = { 
    dist: BigInt(localStorage.getItem(CONFIG.STORAGE) || "0"), 
    lastT: 0, 
    active: false,
    vx: 0, vy: 0, vz: 0, // Vecteurs de vitesse
    km_accumulated: 0 
};

window.addEventListener('devicemotion', (e) => {
    if (!state.active) return;

    const now = performance.now();
    if (state.lastT === 0) { state.lastT = now; return; }
    const dt = (now - state.lastT) / 1000;
    state.lastT = now;

    // 1. FORCE NETTE (Loi de Newton)
    // On utilise l'accélération pure sans gravité car la force de réaction du sol l'annule.
    const a = e.acceleration;
    if (!a || a.x === null) return;

    // 2. INTÉGRATION VECTORIELLE (Inertie)
    // La vitesse s'accumule sur chaque axe.
    state.vx += a.x * dt;
    state.vy += a.y * dt;
    state.vz += a.z * dt;

    // 3. LA FRICTION UNIVERSELLE (Thermodynamique)
    // Rien ne glisse éternellement. On simule la perte d'énergie (frottement de l'air/sol).
    // Cela remplace les "filtres" mathématiques par une réalité physique.
    const friction = 0.96; // 4% d'énergie perdue par micro-cycle (ajustable)
    state.vx *= friction;
    state.vy *= friction;
    state.vz *= friction;

    // 4. MAGNITUDE DE LA VÉLOCITÉ 3D
    // V_total = √(Vx² + Vy² + Vz²)
    const v_magnitude = Math.sqrt(state.vx**2 + state.vy**2 + state.vz**2);

    // 5. DÉPLACEMENT (Cinématique finale)
    const ds_meters = v_magnitude * dt;
    state.km_accumulated += (ds_meters / 1000);

    // Gravure Atomique (Planck-Scale)
    const ds_quanta = BigInt(Math.floor(ds_meters * Number(CONFIG.PRECISION)));
    state.dist += ds_quanta;

    // --- RENDU ÉCRAN ---
    let s = state.dist.toString().padStart(41, '0');
    document.getElementById('val').innerText = `${s.slice(0, -40) || '0'}.${s.slice(-40)}`;
    
    document.getElementById('v_ms').innerText = v_magnitude.toFixed(4);
    document.getElementById('v_vec').innerText = `X: ${state.vx.toFixed(2)} | Y: ${state.vy.toFixed(2)} | Z: ${state.vz.toFixed(2)}`;
    document.getElementById('d_m').innerText = state.km_accumulated.toFixed(6);

    // Sauvegarde tous les 250 quanta
    if (state.dist % 250n === 0n) localStorage.setItem(CONFIG.STORAGE, state.dist.toString());
});

document.getElementById('ignite').addEventListener('click', async () => {
    if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
    state.active = true;
    document.getElementById('ignite').style.display = 'none';
});
</script>
</body>
</html>
