<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA V500 | DISPONIBILITÉ BRUTE</title>
    <style>
        :root { --neon: #00ff88; --warn: #ff003c; --bg: #000; --material: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        .os-interface { padding: 15px; display: flex; flex-direction: column; height: 100vh; }
        
        .main-v { text-align: center; border-bottom: 1px solid var(--material); padding: 40px 0; position: relative; }
        #v-real { font-size: 6rem; font-weight: 900; color: var(--neon); margin: 0; letter-spacing: -5px; }
        .availability-tag { position: absolute; top: 10px; right: 10px; font-size: 0.5rem; color: var(--neon); border: 1px solid var(--neon); padding: 2px 5px; }

        .material-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-top: 10px; background: var(--material); border: 1px solid var(--material); }
        .spec-card { background: #000; padding: 15px; display: flex; flex-direction: column; }
        .spec-card label { font-size: 0.5rem; color: #555; text-transform: uppercase; margin-bottom: 8px; }
        .val-container { display: flex; justify-content: space-between; align-items: baseline; }
        .val { font-size: 1.1rem; color: #fff; font-weight: bold; }
        .status { font-size: 0.45rem; padding: 1px 4px; border-radius: 2px; }
        .status.online { background: rgba(0,255,136,0.1); color: var(--neon); }
        .status.waiting { background: rgba(255,0,60,0.1); color: var(--warn); }

        #raw-terminal { flex-grow: 1; margin-top: 10px; background: #050505; color: var(--neon); font-size: 0.5rem; padding: 10px; overflow: hidden; border-left: 1px solid var(--neon); }
        
        .controls { padding: 20px 0; display: flex; gap: 10px; }
        button { flex: 1; padding: 20px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .no-data { color: #222 !important; }
    </style>
</head>
<body>

    <div class="os-interface">
        <div class="main-v">
            <div id="v-status" class="availability-tag">IDLE</div>
            <h1 id="v-real" class="no-data">--</h1>
            <div style="font-size: 0.6rem; color: #333; letter-spacing: 5px;">KM/H BRUT</div>
        </div>

        <div class="material-grid">
            <div class="spec-card">
                <label>Accéléromètre (IMU)</label>
                <div class="val-container">
                    <span id="acc-val" class="val no-data">--</span>
                    <span id="acc-status" class="status waiting">OFFLINE</span>
                </div>
            </div>
            <div class="spec-card">
                <label>Gyroscope (Vortex)</label>
                <div class="val-container">
                    <span id="gyro-val" class="val no-data">--</span>
                    <span id="gyro-status" class="status waiting">OFFLINE</span>
                </div>
            </div>
            <div class="spec-card">
                <label>Shot Noise (ADC)</label>
                <div class="val-container">
                    <span id="shot-val" class="val no-data">--</span>
                    <span id="shot-status" class="status waiting">OFFLINE</span>
                </div>
            </div>
            <div class="spec-card">
                <label>Fréquence Quartz</label>
                <div class="val-container">
                    <span id="hz-val" class="val no-data">--</span>
                    <span id="hz-status" class="status waiting">OFFLINE</span>
                </div>
            </div>
        </div>

        <div id="raw-terminal">> ATTENTE IGNITION MATÉRIELLE...</div>

        <div class="controls">
            <button id="ignite">Ouvrir les vannes ADC</button>
        </div>
    </div>

<script>
const OMEGA_V500 = {
    state: { v: 0, t0: performance.now(), active: false },
    frames: 0,
    lastHzUpdate: performance.now(),

    async init() {
        this.state.active = true;
        document.getElementById('ignite').style.display = 'none';
        window.addEventListener('devicemotion', (e) => this.suture(e));
        this.syncQuartz();
        this.log("FLUX MATÉRIEL OUVERT. ZÉRO LISSAGE.");
    },

    log(msg) {
        const term = document.getElementById('raw-terminal');
        term.innerHTML = `> ${msg}<br>` + term.innerHTML;
    },

    updateElement(id, value, statusId, isAvailable) {
        const el = document.getElementById(id);
        const st = document.getElementById(statusId);
        
        if (isAvailable && value !== 0 && value !== "0.000") {
            el.innerText = value;
            el.classList.remove('no-data');
            st.innerText = "ONLINE";
            st.className = "status online";
            return true;
        } else {
            el.innerText = "--";
            el.classList.add('no-data');
            st.innerText = "WAITING";
            st.className = "status waiting";
            return false;
        }
    },

    suture(e) {
        if (!this.state.active) return;
        
        const now = performance.now();
        const dt = (now - this.state.t0) / 1000;
        this.state.t0 = now;

        // 1. ACCÉLÉRATION BRUTE (SANS FILTRE)
        const a = e.acceleration;
        const mag = a ? Math.sqrt(a.x**2 + a.y**2 + a.z**2) : 0;
        const accAvailable = this.updateElement('acc-val', mag.toFixed(4), 'acc-status', a !== null);

        // 2. GYRO BRUT
        const g = e.rotationRate;
        const w = g ? Math.sqrt(g.alpha**2 + g.beta**2 + g.gamma**2) : 0;
        const gyroAvailable = this.updateElement('gyro-val', w.toFixed(2) + "°/s", 'gyro-status', g !== null);

        // 3. VITESSE (Calculée uniquement si mouvement réel > bruit de fond)
        if (mag > 0.15) {
            this.state.v += mag * dt;
            const kmh = (this.state.v * 3.6).toFixed(3);
            document.getElementById('v-real').innerText = kmh;
            document.getElementById('v-real').classList.remove('no-data');
            document.getElementById('v-status').innerText = "LIVE";
        } else {
            this.state.v *= 0.99; // Friction
        }

        // 4. SHOT NOISE (Audit de tension - basé sur ton -0.6309)
        const shot = (mag * -0.6309 / 9.81);
        this.updateElement('shot-val', shot.toFixed(5) + " μV", 'shot-status', mag > 0);
    },

    syncQuartz() {
        const loop = () => {
            this.frames++;
            const now = performance.now();
            if (now - this.lastHzUpdate >= 1000) {
                this.updateElement('hz-val', this.frames + " HZ", 'hz-status', true);
                this.frames = 0;
                this.lastHzUpdate = now;
            }
            if (this.state.active) requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
    }
};

document.getElementById('ignite').onclick = () => OMEGA_V500.init();
</script>
</body>
</html>
