<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA V55 | SILENCE MÉTROLOGIQUE</title>
    <style>
        :root { --neon: #00ff88; --alpha: #00d2ff; --bg: #000; --red: #ff003c; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        .matrix { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 10px; }
        .e { height: 10px; background: #111; border: 1px solid #222; font-size: 0.4rem; text-align: center; color: #333; }
        .e.active { border-color: var(--neon); color: var(--neon); }
        .dash { border: 2px solid #222; padding: 20px; background: rgba(0,0,0,0.95); text-align: center; }
        .v-main { font-size: 5rem; font-weight: 900; color: var(--neon); margin: 0; }
        .status { font-size: 0.7rem; color: var(--alpha); margin-top: 10px; text-transform: uppercase; }
        button { width: 100%; padding: 20px; background: #fff; color: #000; font-weight: bold; border: none; margin-top: 10px; cursor: pointer; }
        #video-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.1; object-fit: cover; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay playsinline muted></video>
    <div class="matrix" id="matrix"></div>

    <div class="dash">
        <div id="v-display" class="v-main">--.---</div>
        <div style="font-size:0.6rem; color:#666; letter-spacing:2px;">KM/H SUTURÉS (S10 OMNI)</div>
        <div id="suture-status" class="status">ATTENTE INITIALISATION...</div>
    </div>

    <button id="ignite">DÉMARRER SANS ÉCHO</button>

<script>
const OMEGA = {
    v_gps: 0, acc_gps: 999,
    audio: { ctx: null, analyser: null, data: null },

    async init() {
        document.getElementById('ignite').style.display = 'none';
        this.buildMatrix();

        // 1. Capture Flux (Caméra + Micro)
        const stream = await navigator.mediaDevices.getUserMedia({ 
            audio: {
                echoCancellation: false, // On veut le bruit brut du vent
                noiseSuppression: false, // On veut la physique réelle
                autoGainControl: false   // On veut la linéarité
            }, 
            video: { facingMode: "environment" } 
        });

        document.getElementById('video-bg').srcObject = stream;

        // 2. SUTURE ACOUSTIQUE MUETTE
        this.audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
        const source = this.audio.ctx.createMediaStreamSource(stream);
        this.audio.analyser = this.audio.ctx.createAnalyser();
        
        // CONNEXION : Micro -> Analyseur (ET RIEN D'AUTRE)
        source.connect(this.audio.analyser);
        
        // SÉCURITÉ ABSOLUE : On s'assure que l'analyseur n'est PAS connecté aux haut-parleurs
        // Par défaut, sans "connect(ctx.destination)", le son est traité mais inaudible.
        
        this.audio.data = new Uint8Array(this.audio.analyser.frequencyBinCount);

        this.initGNSS();
        this.loop();
    },

    buildMatrix() {
        const m = document.getElementById('matrix');
        for(let i=0; i<42; i++) m.innerHTML += `<div class="e" id="e${i}">${i}</div>`;
    },

    initGNSS() {
        navigator.geolocation.watchPosition(p => {
            this.v_gps = p.coords.speed || 0;
            this.acc_gps = p.coords.accuracy;
            this.updateState(0, p.coords.accuracy <= 3);
        }, null, { enableHighAccuracy: true });
    },

    updateState(i, active) {
        const el = document.getElementById('e'+i);
        if(el) el.className = `e ${active ? 'active' : ''}`;
    },

    loop() {
        const frame = () => {
            // Analyse Acoustique (Doppler / Friction)
            this.audio.analyser.getByteFrequencyData(this.audio.data);
            const volume = this.audio.data.reduce((a, b) => a + b) / this.audio.data.length;
            
            // Si précision GPS < 3m, on affiche. Sinon, on se tait.
            if (this.acc_gps <= 3.0 && this.v_gps > 0.2) {
                document.getElementById('v-display').innerText = (this.v_gps * 3.6).toFixed(3);
                document.getElementById('suture-status').innerText = "COHÉRENCE MULTI-FLUX OK";
                document.getElementById('v-display').style.color = "var(--neon)";
            } else {
                document.getElementById('v-display').innerText = "--.---";
                document.getElementById('suture-status').innerText = "STASE (PRÉCISION INSUFFISANTE)";
                document.getElementById('v-display').style.color = "var(--red)";
            }

            requestAnimationFrame(frame);
        };
        frame();
    }
};

document.getElementById('ignite').addEventListener('click', () => OMEGA.init());
</script>
</body>
</html>
