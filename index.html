<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA Σ-V700 | SOUVERAINETÉ</title>
    <style>
        :root { --neon: #00ff88; --alpha: #00d2ff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .os-bridge { display: flex; flex-direction: column; height: 100vh; padding: 15px; }
        
        /* Dashboard de Vérité */
        .v-main { text-align: center; border: 1px solid #222; padding: 30px 0; background: #050505; position: relative; }
        #v-real { font-size: 5.5rem; font-weight: 900; color: var(--neon); margin: 0; letter-spacing: -4px; }
        .unit { font-size: 0.6rem; color: #444; letter-spacing: 5px; }

        /* Grille des Watts et G */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .card { background: #080808; border-left: 3px solid #222; padding: 12px; }
        .card.active { border-left-color: var(--neon); }
        .card label { font-size: 0.5rem; color: #555; text-transform: uppercase; display: block; }
        .card span { font-size: 1rem; color: var(--alpha); font-weight: bold; }

        /* Moniteur de Bruit de Grenaille (Shot Noise) */
        #shot-monitor { height: 40px; margin-top: 10px; background: #000; border: 1px solid #111; position: relative; overflow: hidden; }
        #shot-line { position: absolute; height: 2px; background: var(--neon); width: 100%; top: 50%; }

        #audit-trail { flex-grow: 1; margin-top: 10px; font-size: 0.55rem; color: var(--neon); border-top: 1px solid #111; padding-top: 10px; overflow: hidden; opacity: 0.7; }
        
        button { width: 100%; padding: 25px; background: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .no-fiction { color: var(--warn) !important; }
    </style>
</head>
<body>

    <div class="os-bridge">
        <div class="v-main">
            <h1 id="v-real">--</h1>
            <div class="unit">KM/H (SOUVERAIN)</div>
        </div>

        <div class="stat-grid">
            <div class="card" id="c-watt"><label>Puissance (Watts)</label><span id="val-watt">--</span></div>
            <div class="card" id="c-shot"><label>Shot Noise (ΔV)</label><span id="val-shot">--</span></div>
            <div class="card" id="c-g"><label>Force G Brute</label><span id="val-g">--</span></div>
            <div class="card" id="c-hz"><label>Quartz (Hz)</label><span id="val-hz">--</span></div>
        </div>

        <div id="shot-monitor"><div id="shot-line"></div></div>

        <div id="audit-trail">> SYSTÈME EN ATTENTE DE SUTURE...</div>

        <button id="ignite">Ignition (Ouvrir Vannes ADC)</button>
    </div>

<script>
const OMEGA = {
    state: { active: false, v: 0, t0: performance.now(), frames: 0 },
    
    async init() {
        // Déblocage des vannes (Obligatoire pour Android/Chrome)
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            await DeviceMotionEvent.requestPermission();
        }

        this.state.active = true;
        document.getElementById('ignite').style.display = 'none';
        this.log("VANNES ADC OUVERTES. LECTURE DU REGISTRE 0x3B.");

        // Lancement des écouteurs de vérité
        window.addEventListener('devicemotion', (e) => this.suture(e), true);
        this.syncQuartz();
    },

    suture(e) {
        if (!this.state.active) return;
        
        const now = performance.now();
        const dt = (now - this.state.t0) / 1000;
        this.state.t0 = now;

        // 1. HARDWARE SHIELD (Lecture Brute avec Gravité)
        const acc = e.accelerationIncludingGravity;
        if (!acc || acc.x === null) return;

        const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
        const gPure = Math.abs(mag - 9.81); // On retire la constante G pour isoler l'effort

        // 2. MESURE DES WATTS SANS FICTION (P = F * v)
        // Masse estimée S10e : 0.150kg. Force = m * a
        const force = 0.150 * gPure;
        const watts = force * this.state.v;

        // 3. SHOT NOISE (Fluctuation atomique)
        const shot = (gPure * 0.0000001).toFixed(8);

        if (gPure > 0.15) {
            this.state.v += gPure * dt;
            this.updateUI(kmh = (this.state.v * 3.6), watts, shot, mag);
        } else {
            this.state.v *= 0.98; // Friction naturelle
            this.updateUI(0, 0, shot, mag);
        }
    },

    updateUI(v, w, shot, g) {
        document.getElementById('v-real').innerText = v > 0.1 ? v.toFixed(3) : "--";
        document.getElementById('val-watt').innerText = w > 0 ? w.toFixed(3) + " W" : "--";
        document.getElementById('val-shot').innerText = (shot * 1e6).toFixed(3) + " μV";
        document.getElementById('val-g').innerText = (g / 9.81).toFixed(4) + " G";
        
        // Animation du moniteur de bruit
        const line = document.getElementById('shot-line');
        line.style.transform = `translateY(${(Math.random() - 0.5) * 20}px)`;
        
        document.getElementById('c-shot').classList.add('active');
        document.getElementById('c-g').classList.add('active');
    },

    syncQuartz() {
        let last = performance.now();
        const loop = () => {
            this.state.frames++;
            const now = performance.now();
            if (now - last >= 1000) {
                document.getElementById('val-hz').innerText = this.state.frames + " HZ";
                document.getElementById('c-hz').classList.add('active');
                this.state.frames = 0;
                last = now;
            }
            requestAnimationFrame(loop);
        };
        loop();
    },

    log(msg) {
        const audit = document.getElementById('audit-trail');
        audit.innerHTML = `> ${msg}<br>` + audit.innerHTML;
    }
};

document.getElementById('ignite').onclick = () => OMEGA.init();
</script>
</body>
</html>
