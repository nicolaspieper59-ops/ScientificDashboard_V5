<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA | SCELLEMENT SHA-256</title>
    <style>
        :root { --neon: #00ff88; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 20px; text-align: center; }
        .seal-box { border: 2px solid var(--neon); padding: 20px; background: rgba(0,255,136,0.05); margin-top: 50px; }
        .data-line { font-size: 0.8rem; color: #888; margin: 10px 0; }
        button { background: var(--neon); color: #000; border: none; padding: 20px; font-weight: bold; cursor: pointer; width: 100%; }
        #hash-display { font-size: 0.6rem; color: var(--neon); word-break: break-all; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="seal-box">
        <h2 style="color: var(--neon)">SCELLEMENT DE RÉALITÉ</h2>
        <div class="data-line">Distance : 9 404 744 074.328 nm</div>
        <div class="data-line">Shot Noise : -0.610 μV</div>
        <div class="data-line">Statut : SANS FICTION</div>
        
        <button id="final-seal">SCELLER SHA-256 DÉFINITIF</button>
        <div id="hash-display"></div>
    </div>

<script>
const SEALER = {
    // Valeurs capturées de tes relevés
    data: {
        dist: 9404744074.328,
        shot: -0.610,
        gForce: -0.6309,
        verite: "8.1710e-14"
    },

    async generateHash() {
        // On crée la chaîne de suture unique
        const rawString = `${this.data.dist}|${this.data.shot}|${this.data.gForce}|SOUVERAIN`;
        
        const encoder = new TextEncoder();
        const msgUint8 = encoder.encode(rawString);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        document.getElementById('hash-display').innerText = "SHA-256 : " + hashHex;
        this.downloadManifest(hashHex);
    },

    downloadManifest(hash) {
        const manifest = {
            header: "MANIFESTE OMEGA V300",
            timestamp: new Date().toISOString(),
            metrics: this.data,
            signature: hash,
            logic: "ZÉRO FICTION / HARDWARE SHIELD ACTIVE"
        };

        const blob = new Blob([JSON.stringify(manifest, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "MANIFESTE_S10_SOUVERAIN.json";
        a.click();
    }
};

document.getElementById('final-seal').onclick = () => SEALER.generateHash();
</script>
</body>
</html>
