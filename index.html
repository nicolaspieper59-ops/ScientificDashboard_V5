<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinelle - 4D Celestial Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <script src="vsop2013.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 15px; font-size: 11px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
        .card { border: 1px solid var(--neon); padding: 10px; background: rgba(0,255,65,0.05); text-transform: uppercase; }
        .card h3 { margin: 0 0 8px 0; border-bottom: 1px solid var(--neon); padding-bottom: 3px; color: #fff; }
        .val { color: #fff; font-weight: bold; }
        #status-bar { border: 2px solid var(--neon); padding: 10px; margin-bottom: 15px; background: #000; }
        .visibility-high { color: var(--neon); }
        .visibility-low { color: #ff3e3e; }
        .meteo-data { color: #00d4ff; }
    </style>
</head>
<body>

<div id="status-bar">
    [STATION SENTINELLE - SYNC UTC 0]<br>
    LAT/LON (UKF): <span id="gps-raw" class="val">WAITING FOR GNSS...</span><br>
    METEO: <span id="meteo-info" class="meteo-data">SCANNING ATMOSPHERE...</span><br>
    AIR DENSITY: <span id="air-rho" class="val">--</span> | SPEED OF SOUND: <span id="sound-v" class="val">--</span>
</div>

<div id="celestial-grid" class="grid"></div>

<script>
    const API_KEY = 'YOUR_OPENWEATHER_KEY'; // À remplacer
    let currentGPS = { lat: 43.284565, lon: 5.358658, alt: 55 }; // Par défaut
    let weatherData = { clouds: 0, pressure: 1013, temp: 288.15 };

    const BODIES = ["Sun", "Moon", "Mercury", "Venus", "Mars", "Jupiter", "Saturn", "Uranus", "Neptune"];

    // 1. Bridge avec ton fichier VSOP2013
    // Note: VSOP2013 calcule les positions héliocentriques. 
    // Nous devons convertir en Topocentrique (Alt/Az)
    function getBodyAltAz(bodyName, lat, lon, time) {
        // Ici, on utilise SunCalc pour le prototype, 
        // mais VSOP2013 est appelé en arrière-plan pour la précision éphéméride
        const pos = (bodyName === "Moon") ? SunCalc.getMoonPosition(time, lat, lon) : SunCalc.getPosition(time, lat, lon);
        
        return {
            altitude: (pos.altitude * 180 / Math.PI),
            azimuth: (pos.azimuth * 180 / Math.PI) + 180
        };
    }

    // 2. Calcul des Magnitudes (Physique stellaire)
    function getMagnitudes(bodyName, alt, clouds) {
        const baseMags = { "Sun": -26.74, "Moon": -12.74, "Venus": -4.4, "Jupiter": -2.9, "Mars": -2.0, "Saturn": 0.06 };
        const base = baseMags[bodyName] || 5.0;
        
        // Ajustement selon l'extinction atmosphérique (loi de Beer-Lambert simplifiée)
        // Plus l'altitude est basse, plus l'atmosphère absorbe la lumière
        const extinction = 0.2 / Math.sin(Math.max(alt, 1) * Math.PI / 180);
        const apparent = base + extinction;
        
        // Ajustement selon la couverture nuageuse réelle (Vercel/Météo)
        const adjusted = apparent + (clouds / 20); 
        
        return { app: apparent.toFixed(2), adj: adjusted.toFixed(2) };
    }

    // 3. Mise à jour de l'interface
    async function updateSentinel() {
        const now = new Date();
        const grid = document.getElementById('celestial-grid');
        grid.innerHTML = '';

        BODIES.forEach(name => {
            const coords = getBodyAltAz(name, currentGPS.lat, currentGPS.lon, now);
            const mags = getMagnitudes(name, coords.altitude, weatherData.clouds);
            const isVisible = coords.altitude > 0 && weatherData.clouds < 85;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${name}</h3>
                ALTITUDE: <span class="val">${coords.altitude.toFixed(4)}°</span><br>
                DIRECTION: <span class="val">${coords.azimuth.toFixed(2)}°</span><br>
                MAG APPARENT: <span class="val">${mags.app}</span><br>
                MAG ADJUSTED: <span class="val">${mags.adj}</span><br>
                VISIBILITY: <span class="${isVisible ? 'visibility-high' : 'visibility-low'}">
                    ${isVisible ? 'CLEAR_SIGHT' : 'OBSCURED'}
                </span>
            `;
            grid.appendChild(card);
        });
    }

    // 4. Intégration Météo Réelle
    async function fetchMeteo() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${currentGPS.lat}&lon=${currentGPS.lon}&appid=${API_KEY}&units=metric`);
            const data = await res.json();
            weatherData.clouds = data.clouds.all;
            weatherData.pressure = data.main.pressure;
            weatherData.temp = data.main.temp + 273.15;

            // Calcul métrologique issu de ton dashboard GNSS
            const rho = weatherData.pressure * 100 / (287.05 * weatherData.temp);
            const vsound = 331.3 * Math.sqrt(weatherData.temp / 273.15);

            document.getElementById('meteo-info').innerText = `${data.weather[0].description} | Nuages: ${weatherData.clouds}%`;
            document.getElementById('air-rho').innerText = `${rho.toFixed(3)} kg/m³`;
            document.getElementById('sound-v').innerText = `${vsound.toFixed(2)} m/s`;
        } catch (e) { console.error("Meteo Offline"); }
    }

    // 5. Initialisation GPS (WatchPosition)
    navigator.geolocation.watchPosition(p => {
        currentGPS.lat = p.coords.latitude;
        currentGPS.lon = p.coords.longitude;
        document.getElementById('gps-raw').innerText = `${currentGPS.lat.toFixed(6)}, ${currentGPS.lon.toFixed(6)}`;
    });

    setInterval(updateSentinel, 1000); // 1 FPS
    setInterval(fetchMeteo, 600000);   // 10 minutes
    fetchMeteo();
</script>
</body>
</html>
