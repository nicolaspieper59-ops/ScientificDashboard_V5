<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMEGA SUTURE v2000 | SM-G970F</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bignumber.js/9.1.2/bignumber.min.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        #sp-main { font-size: 5rem; color: var(--neon); text-shadow: 0 0 20px var(--neon); }
        .stat { border: 1px solid #222; padding: 10px; margin: 10px 0; font-size: 0.8rem; text-align: left; }
        .label { color: #888; }
    </style>
</head>
<body>
    <div id="sp-main">0.00</div>
    <div>KM/H</div>
    <div id="mm-s" style="color:#00d2ff">0 mm/s</div>

    <div class="stat">
        <span class="label">TEMPÉRATURE NOYAU (Termux) :</span> <span id="val-temp">---</span>
    </div>
    <div class="stat">
        <span class="label">BRUIT NYQUIST-JOHNSON :</span> <span id="val-noise">---</span>
    </div>

    <script>
        const OMEGA = {
            temp: new BigNumber(30),
            buffer: [],

            async syncThermal() {
                try {
                    const r = await fetch('http://127.0.0.1:5000/temp');
                    const d = await r.json();
                    this.temp = new BigNumber(d.temp);
                    document.getElementById('val-temp').innerText = d.temp + "°C";
                } catch(e) {}
            },

            init() {
                setInterval(() => this.syncThermal(), 500);
                window.addEventListener('devicemotion', (e) => {
                    // SUTURE DE GRAVITÉ : On prend l'accélération linéaire pure (sans G)
                    const rawA = new BigNumber(e.acceleration.y || 0);
                    
                    // CALCUL DU BRUIT THERMIQUE RÉEL
                    const k = new BigNumber('1.380649e-23');
                    const noise = k.multipliedBy(this.temp.plus(273.15)).multipliedBy(4).sqrt();
                    document.getElementById('val-noise').innerText = noise.toFixed(15);

                    // SOUSTRACTION SANS FICTION
                    const cleanA = rawA.minus(noise);
                    this.buffer.push(cleanA);
                    if(this.buffer.length > 50) this.buffer.shift();

                    const avgA = this.buffer.reduce((a,b) => a.plus(b), new BigNumber(0)).div(this.buffer.length);
                    const v_ms = avgA.abs(); // Simplifié pour l'exemple
                    
                    document.getElementById('sp-main').innerText = v_ms.multipliedBy(3.6).toFixed(2);
                    document.getElementById('mm-s').innerText = v_ms.multipliedBy(1000).toFixed(0) + " mm/s";
                });
            }
        };
        document.body.onclick = () => { OMEGA.init(); document.body.onclick = null; };
    </script>
</body>
</html>
