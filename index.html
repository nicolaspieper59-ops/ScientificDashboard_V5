<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinelle Station - Ephem Pure Sync</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="lib/ephem.js"></script>
    
    <style>
        :root { --neon: #00ff41; --bg: #000000; --dim: #003311; --data: #00d4ff; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 20px; font-size: 11px; }
        
        #boot-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; 
        }

        .header { border: 1px solid var(--neon); padding: 15px; margin-bottom: 20px; background: rgba(0,255,65,0.02); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        
        .card { border: 1px solid var(--neon); padding: 12px; display: none; background: rgba(0,255,65,0.04); }
        .card.active { display: block; }
        
        .card h3 { margin: 0 0 10px 0; color: #fff; border-bottom: 1px solid var(--dim); padding-bottom: 5px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .label { color: var(--dim); }
        .val { color: var(--data); font-weight: bold; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        #log-terminal { color: #ffae00; font-size: 10px; margin-top: 5px; font-family: monospace; }
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="blink">[ COUPLAGE MATRICIEL : VÉRIFICATION DES LOGS ET ÉPHÉMÉRIDES... ]</div>
</div>

<div class="header">
    <strong>[SYSTEMA SENTINELA - KERNEL ACTIVE]</strong><br>
    <div class="row"><span class="label">GPS_MÉTRIC (UKF):</span> <span id="gps-display" class="val">SCANNING...</span></div>
    <div class="row"><span class="label">CHRONO_REAL_UTC:</span> <span id="time-display" class="val">SYNC...</span></div>
    <div class="row"><span class="label">ATMOS_DENSITY (ρ):</span> <span id="rho-display" class="val">COMPUTING...</span> <span class="label">| V_SON (v):</span> <span id="vsound-display" class="val">COMPUTING...</span></div>
    <div id="log-terminal">> Initialisation du noyau...</div>
</div>

<div id="planet-container" class="grid"></div>

<script>
    const PROXY_BASE_URL = "https://scientific-dashboard5.vercel.app";
    const PROXY_WEATHER_ENDPOINT = `${PROXY_BASE_URL}/api/weather`;
    const SERVER_TIME_ENDPOINT = "https://worldtimeapi.org/api/utc";

    let state = {
        booted: false,
        coords: { lat: 43.284565, lon: 5.358658, alt: 55 }, // Valeurs de repli (Marseille)
        weather: { temp: 288.15, press: 1013.25, clouds: 0 },
        timeOffset: 0
    };

    function printKernelLog(msg) {
        const term = document.getElementById('log-terminal');
        if(term) term.innerText = `> ${msg}`;
    }

    // 1. Séquence de démarrage blindée
    async function bootSequence() {
        try {
            printKernelLog("Interrogation de l'horloge atomique...");
            const resTime = await fetch(SERVER_TIME_ENDPOINT);
            if(resTime.ok) {
                const tData = await resTime.json();
                state.timeOffset = new Date(tData.utc_datetime).getTime() - Date.now();
                printKernelLog("Horloge UTC synchronisée avec succès.");
            }
        } catch (e) {
            printKernelLog("Serveur de temps inaccessible. Utilisation de la dérive locale.");
        }

        // Sécurité critique : On lève le rideau quoi qu'il arrive après 3 secondes
        setTimeout(() => {
            if (!state.booted) {
                state.booted = true;
                const overlay = document.getElementById('boot-screen');
                if(overlay) overlay.style.display = 'none';
                printKernelLog("Noyau démarré. Mode nominal activé.");
                fetchWeather();
            }
        }, 3000);

        printKernelLog("Recherche des satellites GNSS...");
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (p) => {
                    state.coords.lat = p.coords.latitude;
                    state.coords.lon = p.coords.longitude;
                    state.coords.alt = p.coords.altitude || 0;
                    
                    const gpsIndicator = document.getElementById('gps-display');
                    if(gpsIndicator) {
                        gpsIndicator.innerText = `${state.coords.lat.toFixed(6)} N / ${state.coords.lon.toFixed(6)} E (Alt: ${state.coords.alt.toFixed(1)}m)`;
                    }
                    
                    if (!state.booted) {
                        state.booted = true;
                        const overlay = document.getElementById('boot-screen');
                        if(overlay) overlay.style.display = 'none';
                        fetchWeather();
                    }
                },
                (err) => {
                    printKernelLog(`GNSS indisponible (${err.message}). Utilisation des coordonnées géographiques par défaut.`);
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }
    }

    // 2. Traitement Météo et Paramètres Physiques Fluviaux
    async function fetchWeather() {
        if (!state.coords.lat) return;
        try {
            printKernelLog("Mise à jour de l'état de la troposphère...");
            const res = await fetch(`${PROXY_WEATHER_ENDPOINT}?lat=${state.coords.lat}&lon=${state.coords.lon}`);
            if(!res.ok) throw new Error("Réponse proxy invalide");
            const data = await res.json();
            
            state.weather.temp = data.main.temp + 273.15; // Conversion en Kelvin
            state.weather.press = data.main.pressure;     // hPa
            state.weather.clouds = data.clouds.all;
            
            // Équations physiques fondamentales
            const rho = state.weather.press * 100 / (287.05 * state.weather.temp);
            const vsound = 331.3 * Math.sqrt(state.weather.temp / 273.15);
            
            const rhoUi = document.getElementById('rho-display');
            const soundUi = document.getElementById('vsound-display');
            
            if(rhoUi) rhoUi.innerText = rho.toFixed(4) + " kg/m³";
            if(soundUi) soundUi.innerText = vsound.toFixed(2) + " m/s";
            printKernelLog("Métrologie de l'air synchronisée.");
        } catch (e) {
            printKernelLog("Erreur Proxy Météo. Prochaine tentative dans 10 minutes.");
        }
    }

    // 3. Boucle Principale Isolée
    function processCelestialEngine() {
        if (!state.booted) return;

        const now = new Date(Date.now() + state.timeOffset);
        const JD = (now.getTime() / 86400000) + 2440587.5; // Jour Julien
        
        const timeUi = document.getElementById('time-display');
        if(timeUi) timeUi.innerText = now.toISOString().replace('T',' ').substring(0,19) + " Z";

        const targetPlanets = [
            { id: "Mercury", key: "mer", baseMag: -0.42 },
            { id: "Venus",   key: "ven", baseMag: -4.40 },
            { id: "Mars",    key: "mar", baseMag: -1.52 },
            { id: "Jupiter", key: "jup", baseMag: -2.94 },
            { id: "Saturn",  key: "sat", baseMag: 0.06 }
        ];

        const container = document.getElementById('planet-container');
        if (!container) return;

        // Détection de la structure d'objet global générée par ton fichier ephem.js
        if (typeof vsop2013 === 'undefined') {
            printKernelLog("Alerte: L'objet global 'vsop2013' n'est pas encore instancié.");
            return;
        }

        targetPlanets.forEach(p => {
            let card = document.getElementById(`card-${p.id}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `card-${p.id}`;
                card.className = 'card';
                container.appendChild(card);
            }

            try {
                if (!vsop2013[p.key] || typeof vsop2013[p.key].position !== 'function') {
                    card.classList.remove('active');
                    return;
                }

                // Récupération des vecteurs cartésiens [X, Y, Z]
                const pos = vsop2013[p.key].position(JD);
                const earthPos = vsop2013.emb.position(JD);

                if (!pos || !earthPos) return;

                // Géocentrisme directionnel
                const dx = pos[0] - earthPos[0];
                const dy = pos[1] - earthPos[1];
                const dz = pos[2] - earthPos[2];
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                // Mathématique trigonométrique topocentrique
                const altitude = Math.asin(dz / dist) * (180 / Math.PI);
                const azimuth = (Math.atan2(dy, dx) * (180 / Math.PI) + 180) % 360;

                // SMART CULLING (Économie de batterie S10 : suppression si sous l'horizon)
                if (altitude < 0 || isNaN(altitude)) {
                    card.classList.remove('active');
                    return;
                }

                card.classList.add('active');

                // Loi de Beer-Lambert appliquée à la masse d'air réelle (Airmass)
                const airmass = 1 / Math.sin(Math.max(altitude, 1.0) * Math.PI / 180);
                const mApp = p.baseMag + (0.22 * airmass);
                const mAdj = mApp + (state.weather.clouds / 22);

                card.innerHTML = `
                    <h3>${p.id.toUpperCase()}</h3>
                    <div class="row"><span class="label">ALTITUDE</span><span class="val">${altitude.toFixed(4)}°</span></div>
                    <div class="row"><span class="label">DIRECTION</span><span class="val">${azimuth.toFixed(2)}°</span></div>
                    <div class="row"><span class="label">MAG_APP</span><span class="val">${mApp.toFixed(2)}</span></div>
                    <div class="row"><span class="label">MAG_ADJ</span><span class="val">${mAdj.toFixed(2)}</span></div>
                    <div class="row"><span class="label">RELEVÉ_MÉTÉO</span><span class="val">${state.weather.clouds < 75 ? 'OPTIMAL' : 'ATTÉNUÉ'}</span></div>
                `;

            } catch (err) {
                card.classList.remove('active');
            }
        });
    }

    // Initialisation et boucles récurrentes
    bootSequence();
    setInterval(processCelestialEngine, 1000); 
    setInterval(fetchWeather, 600000);         
</script>

</body>
    </html>
