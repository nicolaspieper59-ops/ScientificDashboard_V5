<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinelle V4-Pure - Ephem Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="lib/ephem.js"></script>
    
    <style>
        :root { --neon: #00ff41; --bg: #000000; --dim: #003311; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 15px; font-size: 11px; }
        
        /* Écran de masquage - Empêche l'affichage de "0" au démarrage */
        #boot-curtain { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }

        #header-terminal { border: 1px solid var(--neon); padding: 12px; margin-bottom: 15px; background: rgba(0,255,65,0.01); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
        
        /* Les cartes sont invisibles par défaut */
        .card { border: 1px solid var(--neon); padding: 10px; display: none; background: rgba(0,255,65,0.03); }
        .card.active { display: block; }
        
        .card h3 { margin: 0 0 8px 0; color: #fff; font-size: 13px; border-bottom: 1px solid var(--dim); }
        .row { display: flex; justify-content: space-between; margin: 2px 0; }
        .label { color: var(--dim); }
        .val { color: #fff; font-weight: bold; }
        .blink { animation: flash 1.5s infinite; }
        @keyframes flash { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="boot-curtain">
    <div class="blink">[ INITIALISATION MOTEUR EPHEM.JS / SYNC UTC 0 ]</div>
</div>

<div id="header-terminal">
    <strong>SENTINELLE PURE-SYNC v4</strong><br>
    <div class="row"><span class="label">COORDS_GPS:</span> <span id="ui-gps" class="val">--</span></div>
    <div class="row"><span class="label">CHRONO_UTC:</span> <span id="ui-time" class="val">--</span></div>
    <div class="row"><span class="label">ATMOS_DATA:</span> <span id="ui-meteo" class="val">--</span></div>
</div>

<div id="target-grid" class="grid"></div>

<script>
    const PROXY_BASE_URL = "https://scientific-dashboard-v5.vercel.app/";
    const PROXY_WEATHER_ENDPOINT = `${PROXY_BASE_URL}/api/weather`;
    const SERVER_TIME_ENDPOINT = "https://worldtimeapi.org/api/utc";

    let state = {
        isReady: false,
        gps: { lat: null, lon: null, alt: null },
        weather: { t: 288.15, p: 1013, clouds: 0 },
        offset: 0
    };

    // 1. DÉMARRAGE ET SYNC
async function boot() {
    console.log("Tentative de boot...");
    try {
        // Force le rideau à se lever après 7 secondes même si le GPS hésite
        setTimeout(() => {
            if (!state.isReady) {
                console.log("Force Boot: Signal GPS faible, passage en mode manuel.");
                state.isReady = true;
                document.getElementById('boot-curtain').style.display = 'none';
                processCelestial();
            }
        }, 7000);

        // Sync Temps
        const tStart = Date.now();
        const resTime = await fetch(SERVER_TIME_ENDPOINT);
        const tData = await resTime.json();
        state.offset = new Date(tData.utc_datetime).getTime() - Date.now();
        
        // Activation GPS avec haute précision
        navigator.geolocation.watchPosition(p => {
            state.gps.lat = p.coords.latitude;
            state.gps.lon = p.coords.longitude;
            state.gps.alt = p.coords.altitude || 0;
            
            document.getElementById('ui-gps').innerText = `${state.gps.lat.toFixed(6)} / ${state.gps.lon.toFixed(6)}`;
            
            if (!state.isReady) {
                state.isReady = true;
                document.getElementById('boot-curtain').style.display = 'none';
                fetchWeather();
            }
        }, (err) => {
            console.error("Erreur GPS:", err.message);
            // Si le GPS échoue, on utilise tes coordonnées de Marseille par défaut pour débloquer
            state.gps.lat = 43.284565; 
            state.gps.lon = 5.358658;
        }, { enableHighAccuracy: true, timeout: 5000 });

    } catch (e) {
        console.log("Erreur Réseau (Time Sync) - Re-tentative...");
        setTimeout(boot, 3000);
    }
}

    // 3. MOTEUR DE CALCUL EPHEM (SANS VSOP)
    function processCelestial() {
        if (!state.isReady) return;

        const now = new Date(Date.now() + state.offset);
        document.getElementById('ui-time').innerText = now.toISOString().replace('T',' ').substring(0,19) + " Z";

        const bodies = ["Sun", "Moon", "Mercury", "Venus", "Mars", "Jupiter", "Saturn", "Uranus", "Neptune"];
        const grid = document.getElementById('target-grid');

        bodies.forEach(name => {
            // Appel à lib/ephem.js uniquement
            // On suppose que ephem.js expose une méthode type compute(name, date, coords)
            let result;
            try {
                result = ephem.compute(name, now, state.gps); 
            } catch(e) { return; }

            let card = document.getElementById(`c-${name}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `c-${name}`;
                card.className = 'card';
                grid.appendChild(card);
            }

            // GESTION DE L'ÉCONOMIE D'ÉNERGIE (Éteindre si Altitude < 0)
            if (result.altitude < 0) {
                card.classList.remove('active');
                return; 
            }

            card.classList.add('active');

            // Calcul Magnitudes avec Extinction Atmosphérique
            const airmass = 1 / Math.sin(Math.max(result.altitude, 1.5) * Math.PI / 180);
            const mApp = result.magBase + (0.21 * airmass);
            const mAdj = mApp + (state.weather.clouds / 25);

            card.innerHTML = `
                <h3>${name.toUpperCase()}</h3>
                <div class="row"><span class="label">ALTITUDE</span><span class="val">${result.altitude.toFixed(4)}°</span></div>
                <div class="row"><span class="label">DIRECTION</span><span class="val">${result.azimuth.toFixed(2)}°</span></div>
                <div class="row"><span class="label">MAG_APP</span><span class="val">${mApp.toFixed(2)}</span></div>
                <div class="row"><span class="label">MAG_ADJ</span><span class="val">${mAdj.toFixed(2)}</span></div>
                <div class="row"><span class="label">VISIBILITÉ</span><span class="val">${state.weather.clouds < 85 ? 'FULL' : 'LOW'}</span></div>
            `;
        });
    }

    // BOUCLES
    boot();
    setinterval(processCelestial, 1000); // 1 FPS
    setInterval(fetchWeather, 600000);   // Sync Météo 10 min
</script>

</body>
    </html>
